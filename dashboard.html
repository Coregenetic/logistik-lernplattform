<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard – Lernplattform Logistik</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ── TOGGLE ─────────────────────────────────────── */
.lf-locked { opacity:0.45; cursor:not-allowed; position:relative; }
.lf-locked::after { content:'🔒'; position:absolute; top:12px; right:12px; font-size:1rem; }
.toggle { position:relative; width:40px; height:22px; cursor:pointer; display:inline-block; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; inset:0; background:var(--border2); border-radius:99px; transition:0.2s; }
.toggle-slider:before { content:''; position:absolute; width:16px; height:16px; left:3px; top:3px; background:#fff; border-radius:50%; transition:0.2s; }
input:checked + .toggle-slider { background:var(--correct); }
input:checked + .toggle-slider:before { transform:translateX(18px); }

/* ── MOBILE BOTTOM NAV ──────────────────────────── */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom);
}
.bottom-nav-inner {
  display: flex;
  height: 58px;
}
.bn-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  border: none;
  background: none;
  color: var(--muted);
  font-family: inherit;
  font-size: 0.68rem;
  font-weight: 500;
  cursor: pointer;
  padding: 0;
  transition: color 0.15s;
}
.bn-item.active { color: var(--accent); }
.bn-icon { font-size: 1.3rem; line-height: 1; }

/* ── MOBILE HEADER ──────────────────────────────── */
.mob-header {
  display: none;
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 52px;
  align-items: center;
  justify-content: space-between;
}
.mob-header-brand { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; }
.mob-header-right { display: flex; align-items: center; gap: 8px; }
.mob-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 0.78rem; font-weight: 700; color: #fff;
  cursor: pointer;
  border: none;
}

/* ── MOBILE MAIN CONTENT ────────────────────────── */
.mob-main {
  display: none;
  padding: 16px 16px 80px;
  min-height: calc(100vh - 52px);
}

/* ── MOBILE LF CARD (list style) ───────────────── */
.mob-lf-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.mob-lf-card:active { opacity: 0.8; }
.mob-lf-card.locked { opacity: 0.45; cursor: not-allowed; }
.mob-lf-icon-wrap {
  width: 42px; height: 42px;
  border-radius: 12px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}
.mob-lf-info { flex: 1; min-width: 0; }
.mob-lf-num { font-size: 0.7rem; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.mob-lf-name { font-size: 0.92rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mob-lf-bar { height: 3px; background: var(--border); border-radius: 99px; margin-top: 5px; }
.mob-lf-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; }
.mob-lf-arrow { color: var(--muted); font-size: 1.1rem; flex-shrink: 0; }

/* ── MOBILE STAT CARDS ──────────────────────────── */
.mob-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.mob-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.mob-stat-val { font-size: 1.6rem; font-weight: 700; }
.mob-stat-lbl { font-size: 0.75rem; color: var(--muted2); margin-top: 2px; }

/* ── MOBILE SECTION TITLE ───────────────────────── */
.mob-section { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }

/* ── MOBILE GREETING ────────────────────────────── */
.mob-greeting { font-size: 1.2rem; font-weight: 700; margin-bottom: 2px; }
.mob-greeting-sub { font-size: 0.85rem; color: var(--muted2); margin-bottom: 20px; }

/* ── MOBILE INHALT ──────────────────────────────── */
.mob-inhalt-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}
.mob-inhalt-type { width: 40px; height: 40px; border-radius: 10px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }

/* ── BACK BUTTON MOBILE ─────────────────────────── */
.mob-back { display: flex; align-items: center; gap: 6px; color: var(--accent); font-size: 0.9rem; font-weight: 600; background: none; border: none; font-family: inherit; cursor: pointer; margin-bottom: 16px; padding: 0; }

/* ── DESKTOP: hide mobile elements ─────────────── */
@media (min-width: 701px) {
  .mob-header, .mob-main, .bottom-nav { display: none !important; }
  .navbar, .layout { display: flex !important; }
}

/* ── MOBILE: show mobile, hide desktop ──────────── */
@media (max-width: 700px) {
  .navbar, .layout { display: none !important; }
  .mob-header { display: flex !important; }
  .mob-main { display: block !important; }
  .bottom-nav { display: block !important; }
}
</style>
</head>
<body>

<!-- ── DESKTOP NAVBAR ─────────────────────────── -->
<nav class="navbar">
  <div class="navbar-brand gradient-text">🚛 Lernplattform Logistik</div>
  <div class="navbar-nav">
    <span class="nav-user">
      <span id="nav-name" style="font-size:0.88rem"></span>
      <span id="nav-badge"></span>
    </span>
    <button class="btn btn-secondary btn-sm" id="btn-logout">Abmelden</button>
  </div>
</nav>

<!-- ── DESKTOP LAYOUT ─────────────────────────── -->
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<!-- ── MOBILE HEADER ──────────────────────────── -->
<div class="mob-header">
  <div class="mob-header-brand gradient-text">🚛 Lernplattform</div>
  <div class="mob-header-right">
    <span id="mob-badge"></span>
    <button class="mob-avatar" id="mob-avatar" title="Abmelden"></button>
  </div>
</div>

<!-- ── MOBILE MAIN ────────────────────────────── -->
<div class="mob-main" id="mob-main"></div>

<!-- ── BOTTOM NAV ─────────────────────────────── -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner" id="bottom-nav"></div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let USER = null, PROFILE = null;
const isMobile = () => window.innerWidth <= 700;

// ── INIT ─────────────────────────────────────────
db.auth.getSession().then(async ({ data: { session } }) => {
  if (!session) return window.location.href = 'index.html';
  USER = session.user;
  const { data } = await db.from('profiles').select('*').eq('id', USER.id).maybeSingle();
  PROFILE = data;
  if (!PROFILE) return window.location.href = 'index.html';

  const isMod = ['admin','mod'].includes(PROFILE.role);
  const isAdmin = PROFILE.role === 'admin';
  const roleColors = { admin:'badge-admin', mod:'badge-mod', user:'badge-user' };
  const initials = PROFILE.username.substring(0,2).toUpperCase();

  // Desktop navbar
  document.getElementById('nav-name').textContent = PROFILE.username;
  document.getElementById('nav-badge').innerHTML = `<span class="badge ${roleColors[PROFILE.role]}">${PROFILE.role}</span>`;

  // Mobile header
  document.getElementById('mob-badge').innerHTML = `<span class="badge ${roleColors[PROFILE.role]}">${PROFILE.role}</span>`;
  document.getElementById('mob-avatar').textContent = initials;
  document.getElementById('mob-avatar').onclick = () => {
    if (confirm('Abmelden?')) { db.auth.signOut(); window.location.href = 'index.html'; }
  };

  buildSidebar();
  buildBottomNav();
  showHome();
});

document.getElementById('btn-logout').addEventListener('click', async () => {
  await db.auth.signOut();
  window.location.href = 'index.html';
});

// ── DESKTOP SIDEBAR ───────────────────────────────
function buildSidebar() {
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const isAdmin = PROFILE.role === 'admin';
  document.getElementById('sidebar').innerHTML = `
    <div class="sidebar-title">Navigation</div>
    <button class="sidebar-link active" id="lnk-home" onclick="showHome()"><span class="sidebar-icon">🏠</span>Dashboard</button>
    <button class="sidebar-link" id="lnk-lf" onclick="showLernfelder()"><span class="sidebar-icon">📚</span>Lernfelder</button>
    <button class="sidebar-link" id="lnk-fp" onclick="showFortschritt()"><span class="sidebar-icon">📊</span>Mein Fortschritt</button>
    <div class="sidebar-title" style="margin-top:12px">Fächer</div>
    <button class="sidebar-link" id="lnk-fach-1" onclick="showFach(1)"><span class="sidebar-icon">🇬🇧</span>Englisch</button>
    <button class="sidebar-link" id="lnk-fach-2" onclick="showFach(2)"><span class="sidebar-icon">💬</span>Kommunikation</button>
    <button class="sidebar-link" id="lnk-fach-3" onclick="showFach(3)"><span class="sidebar-icon">📊</span>WiPo</button>
    ${isMod ? `<div class="sidebar-title" style="margin-top:12px">Verwaltung</div>
    <button class="sidebar-link" id="lnk-inhalte" onclick="showInhalte()"><span class="sidebar-icon">✏️</span>Inhalte bearbeiten</button>
    <button class="sidebar-link" id="lnk-quiz-import" onclick="showQuizImport()"><span class="sidebar-icon">⚡</span>Quiz importieren</button>` : ''}
    ${isAdmin ? `<button class="sidebar-link" id="lnk-admin" onclick="showAdmin()"><span class="sidebar-icon">⚙️</span>Admin Panel</button>` : ''}
  `;
}

// ── MOBILE BOTTOM NAV ─────────────────────────────
function buildBottomNav() {
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const isAdmin = PROFILE.role === 'admin';
  const items = [
    { id:'bn-home', icon:'🏠', label:'Start', fn:'showHome()' },
    { id:'bn-lf', icon:'📚', label:'Lernen', fn:'showLernfelder()' },
    { id:'bn-faecher', icon:'🇬🇧', label:'Fächer', fn:'showFaecherMob()' },
    { id:'bn-fp', icon:'📊', label:'Fortschritt', fn:'showFortschritt()' },
    ...(isMod ? [{ id:'bn-inhalte', icon:'✏️', label:'Inhalte', fn:'showInhalte()' }] : []),
    ...(isMod ? [{ id:'bn-quiz-import', icon:'⚡', label:'Quiz', fn:'showQuizImport()' }] : []),
    ...(isAdmin ? [{ id:'bn-admin', icon:'⚙️', label:'Admin', fn:'showAdmin()' }] : []),
  ];
  document.getElementById('bottom-nav').innerHTML = items.map(i => `
    <button class="bn-item" id="${i.id}" onclick="${i.fn}">
      <span class="bn-icon">${i.icon}</span>
      <span>${i.label}</span>
    </button>
  `).join('');
}

function setActive(desktopId, mobileId) {
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.bn-item').forEach(l => l.classList.remove('active'));
  if (desktopId) { const el = document.getElementById(desktopId); if (el) el.classList.add('active'); }
  if (mobileId) { const el = document.getElementById(mobileId); if (el) el.classList.add('active'); }
}

function setMain(html) {
  document.getElementById('main').innerHTML = html;
  document.getElementById('mob-main').innerHTML = html;
}

function setDesktop(html) { document.getElementById('main').innerHTML = html; }
function setMobile(html) { document.getElementById('mob-main').innerHTML = html; }

// ── LF CARD HELPERS ───────────────────────────────
function lfCard(lf, isMod) {
  const locked = !lf.freigeschaltet && !isMod;
  return `
    <div class="lf-card ${locked ? 'lf-locked' : ''}" ${!locked ? `onclick="showLernfeldDetail(${lf.id})"` : ''}>
      <div class="lf-card-icon">${lf.icon}</div>
      <div class="lf-card-num">LF ${lf.nummer}</div>
      <div class="lf-card-name">${lf.name}</div>
      <div class="lf-card-desc">${lf.beschreibung||''}</div>
      ${!lf.freigeschaltet && isMod ? '<div style="margin-top:8px;font-size:0.75rem;color:var(--warning)">🔒 Gesperrt</div>' : ''}
    </div>
  `;
}

function mobLfCard(lf, isMod) {
  const locked = !lf.freigeschaltet && !isMod;
  return `
    <div class="mob-lf-card ${locked ? 'locked' : ''}" ${!locked ? `onclick="showLernfeldDetail(${lf.id})"` : ''}>
      <div class="mob-lf-icon-wrap">${lf.icon}</div>
      <div class="mob-lf-info">
        <div class="mob-lf-num">LF ${lf.nummer}${!lf.freigeschaltet && isMod ? ' · 🔒 Gesperrt' : ''}</div>
        <div class="mob-lf-name">${lf.name}</div>
        <div class="mob-lf-bar"><div class="mob-lf-bar-fill" style="width:0%"></div></div>
      </div>
      ${!locked ? '<div class="mob-lf-arrow">›</div>' : '<div class="mob-lf-arrow">🔒</div>'}
    </div>
  `;
}

// ── HOME ─────────────────────────────────────────
async function showHome() {
  setActive('lnk-home', 'bn-home');
  const isMod = ['admin','mod'].includes(PROFILE.role);

  const [{ count: lfCount }, { count: inhCount }, { count: fpCount }] = await Promise.all([
    db.from('lernfelder').select('*', { count:'exact', head:true }),
    db.from('inhalte').select('*', { count:'exact', head:true }),
    db.from('fortschritt').select('*', { count:'exact', head:true }).eq('user_id', USER.id).eq('abgeschlossen', true),
  ]);
  const { data: lernfelder } = await db.from('lernfelder').select('*, lernbereiche(name)').order('nummer').limit(6);

  // Desktop
  setDesktop(`
    <h1 style="margin-bottom:4px">Hallo, <span class="gradient-text">${PROFILE.username}</span> 👋</h1>
    <p style="color:var(--muted2);margin-bottom:28px">Was lernst du heute?</p>
    <div class="grid-3" style="margin-bottom:28px">
      <div class="stat-card"><div class="stat-value gradient-text">${lfCount||0}</div><div class="stat-label">📚 Lernfelder</div></div>
      <div class="stat-card"><div class="stat-value gradient-text">${inhCount||0}</div><div class="stat-label">📄 Inhalte</div></div>
      <div class="stat-card"><div class="stat-value gradient-text">${fpCount||0}</div><div class="stat-label">✅ Erledigt</div></div>
    </div>
    <h2 style="margin-bottom:14px">Schnellzugriff</h2>
    <div class="grid-2">
      ${(lernfelder||[]).map(lf => lfCard(lf, isMod)).join('') || '<p style="color:var(--muted2)">Keine Lernfelder verfügbar.</p>'}
    </div>
  `);

  // Mobile
  setMobile(`
    <div class="mob-greeting">Hallo, <span class="gradient-text">${PROFILE.username}</span> 👋</div>
    <div class="mob-greeting-sub">Was lernst du heute?</div>
    <div class="mob-stats">
      <div class="mob-stat"><div class="mob-stat-val gradient-text">${lfCount||0}</div><div class="mob-stat-lbl">📚 Lernfelder</div></div>
      <div class="mob-stat"><div class="mob-stat-val gradient-text">${fpCount||0}</div><div class="mob-stat-lbl">✅ Erledigt</div></div>
    </div>
    <div class="mob-section">Lernfelder</div>
    ${(lernfelder||[]).map(lf => mobLfCard(lf, isMod)).join('') || '<p style="color:var(--muted2)">Keine Lernfelder verfügbar.</p>'}
  `);
}

// ── LERNFELDER ────────────────────────────────────
async function showLernfelder() {
  setActive('lnk-lf', 'bn-lf');
  const isMod = ['admin','mod'].includes(PROFILE.role);
  setDesktop('<div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>');
  setMobile('<div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>');

  const { data: bereiche } = await db.from('lernbereiche').select('*, lernfelder(*)').order('reihenfolge');

  // Desktop grid view
  setDesktop(`
    <h1 style="margin-bottom:6px">Lernfelder</h1>
    <p style="color:var(--muted2);margin-bottom:24px">LF 1 bis LF 12</p>
    ${(bereiche||[]).map(b => `
      <div style="margin-bottom:28px">
        <h2 style="margin-bottom:4px">${b.icon} ${b.name}</h2>
        <p style="color:var(--muted2);font-size:0.83rem;margin-bottom:14px">${b.beschreibung||''}</p>
        <div class="grid-3">${(b.lernfelder||[]).sort((a,z)=>a.nummer-z.nummer).map(lf=>lfCard(lf,isMod)).join('')}</div>
      </div>
    `).join('')}
  `);

  // Mobile list view
  setMobile(`
    <div class="mob-greeting" style="font-size:1.1rem">📚 Lernfelder</div>
    <div class="mob-greeting-sub">LF 1 bis LF 12</div>
    ${(bereiche||[]).map(b => `
      <div class="mob-section" style="margin-top:16px">${b.icon} ${b.name}</div>
      ${(b.lernfelder||[]).sort((a,z)=>a.nummer-z.nummer).map(lf=>mobLfCard(lf,isMod)).join('')}
    `).join('')}
  `);
}

// ── LERNFELD DETAIL ───────────────────────────────
async function showLernfeldDetail(lfId) {
  setDesktop('<div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>');
  setMobile('<div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>');
  const isMod = ['admin','mod'].includes(PROFILE.role);

  const { data: lf } = await db.from('lernfelder').select('*, lernbereiche(name)').eq('id', lfId).maybeSingle();
  if (!lf || (!lf.freigeschaltet && !isMod)) return showLernfelder();

  const { data: inhalte } = await db.from('inhalte').select('*').eq('lernfeld_id', lfId).order('reihenfolge');
  const typeIcon = { text:'📄', quiz:'❓', lernkarten:'🃏', video:'🎥', html:'🌐' };

  const inhalteDesktop = inhalte && inhalte.length ? inhalte.map(i => `
    <div class="card" style="margin-bottom:12px;cursor:pointer" onclick="showInhalt(${i.id},${lfId})">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:1.5rem">${typeIcon[i.typ]||'📄'}</span>
          <div>
            <div style="font-weight:600">${i.titel}</div>
            <div style="font-size:0.78rem;color:var(--muted2);text-transform:capitalize">${i.typ}</div>
          </div>
        </div>
        <span style="color:var(--accent);font-size:1.2rem">→</span>
      </div>
    </div>
  `).join('') : `<div class="alert alert-info">Noch keine Inhalte für dieses Lernfeld.</div>`;

  const inhalteMobile = inhalte && inhalte.length ? inhalte.map(i => `
    <div class="mob-inhalt-card" onclick="showInhalt(${i.id},${lfId})">
      <div class="mob-inhalt-type">${typeIcon[i.typ]||'📄'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:0.92rem">${i.titel}</div>
        <div style="font-size:0.75rem;color:var(--muted2);text-transform:capitalize;margin-top:2px">${i.typ}</div>
      </div>
      <span style="color:var(--muted);font-size:1.1rem">›</span>
    </div>
  `).join('') : `<div class="alert alert-info">Noch keine Inhalte.</div>`;

  const headerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
      <span style="font-size:2rem">${lf.icon}</span>
      <div>
        <div style="font-size:0.72rem;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:1px">
          LF ${lf.nummer} · ${lf.lernbereiche?.name}${!lf.freigeschaltet?'  🔒':''}
        </div>
        <h1>${lf.name}</h1>
      </div>
    </div>
    <p style="color:var(--muted2);margin-bottom:24px">${lf.beschreibung||''}</p>
  `;

  setDesktop(`
    <button class="btn btn-secondary btn-sm" onclick="showLernfelder()" style="margin-bottom:20px">← Zurück</button>
    ${headerHTML}${inhalteDesktop}
  `);

  setMobile(`
    <button class="mob-back" onclick="showLernfelder()">← Zurück</button>
    <div style="font-size:0.72rem;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">LF ${lf.nummer}</div>
    <div style="font-size:1.1rem;font-weight:700;margin-bottom:4px">${lf.name}</div>
    <div style="font-size:0.83rem;color:var(--muted2);margin-bottom:20px">${lf.beschreibung||''}</div>
    <div class="mob-section">Inhalte</div>
    ${inhalteMobile}
  `);
}

// ── INHALT ANZEIGEN ───────────────────────────────
async function showInhalt(inhaltId, lfId) {
  const { data: i } = await db.from('inhalte').select('*, lernfelder(id,name,nummer)').eq('id', inhaltId).maybeSingle();
  const backBtn = `← LF ${i.lernfelder.nummer}`;

  if (i.typ === 'quiz') {
    renderQuiz(i, backBtn);
  } else {
    const html = (i.inhalt?.text||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    setDesktop(`
      <button class="btn btn-secondary btn-sm" onclick="showLernfeldDetail(${i.lernfelder.id})" style="margin-bottom:20px">${backBtn}</button>
      <h1 style="margin-bottom:20px">${i.titel}</h1>

// ── QUIZ ENGINE ───────────────────────────────────
function normalize(t) {
  return t.toLowerCase()
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss')
    .replace(/[^a-z0-9\s]/g,' ');
}

function bewerte(antwort, frage) {
  const n = normalize(antwort);
  const matched = [], missing = [];
  frage.keywords.forEach(g => {
    const hit = g.words.some(w => n.includes(normalize(w)));
    (hit ? matched : missing).push(g.label);
  });
  const score = matched.length;
  const req = frage.required;
  const verdict = score >= req ? 'richtig' : score >= Math.ceil(req/2) ? 'teilweise' : 'falsch';
  return { verdict, matched, missing };
}

function renderQuiz(inhalt, backBtn) {
  const fragen = inhalt.inhalt?.fragen || [];
  const shuffled = [...fragen].sort(() => Math.random() - 0.5);
  let current = 0, richtig = 0, teilweise = 0, falsch = 0;

  const quizStyles = `
    <style>
      .quiz-wrap { max-width: 620px; }
      .quiz-progress { height:5px; background:var(--border); border-radius:99px; overflow:hidden; margin-bottom:20px; }
      .quiz-progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:99px; transition:width 0.4s; }
      .quiz-counter { font-size:0.78rem; color:var(--muted2); margin-bottom:16px; }
      .quiz-scores { display:flex; gap:14px; margin-bottom:20px; font-size:0.82rem; }
      .qs-r { color:var(--correct); font-weight:600; }
      .qs-t { color:var(--warning); font-weight:600; }
      .qs-f { color:var(--danger); font-weight:600; }
      .quiz-frage { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:22px; margin-bottom:14px; font-size:1rem; font-weight:600; line-height:1.5; }
      .quiz-textarea { width:100%; min-height:100px; background:var(--surface); border:2px solid var(--border); border-radius:14px; color:var(--text); font-family:inherit; font-size:0.95rem; padding:14px; resize:none; outline:none; transition:border-color 0.2s; margin-bottom:12px; line-height:1.5; }
      .quiz-textarea:focus { border-color:var(--accent); }
      .quiz-textarea::placeholder { color:var(--muted); }
      .quiz-submit { width:100%; padding:14px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:14px; color:#fff; font-family:inherit; font-size:1rem; font-weight:600; cursor:pointer; margin-bottom:12px; }
      .quiz-submit:disabled { opacity:0.4; cursor:default; }
      .quiz-feedback { border-radius:14px; padding:14px 16px; margin-bottom:12px; display:none; font-size:0.88rem; line-height:1.6; }
      .quiz-feedback.richtig { background:#10b98115; border:1px solid #10b98144; }
      .quiz-feedback.teilweise { background:#f59e0b15; border:1px solid #f59e0b44; }
      .quiz-feedback.falsch { background:#ef444415; border:1px solid #ef444444; }
      .quiz-verdict { font-weight:700; font-size:1rem; margin-bottom:6px; }
      .richtig .quiz-verdict { color:var(--correct); }
      .teilweise .quiz-verdict { color:var(--warning); }
      .falsch .quiz-verdict { color:var(--danger); }
      .quiz-kw-found { color:#86efac; font-size:0.82rem; margin-bottom:4px; }
      .quiz-kw-miss { color:#fca5a5; font-size:0.82rem; margin-bottom:8px; }
      .quiz-muster { color:var(--muted2); font-size:0.82rem; border-top:1px solid var(--border); padding-top:8px; margin-top:8px; }
      .quiz-muster strong { color:#7dd3fc; }
      .quiz-next { width:100%; padding:14px; background:var(--surface2); border:1px solid var(--border2); border-radius:14px; color:var(--text); font-family:inherit; font-size:1rem; font-weight:600; cursor:pointer; display:none; }
      .quiz-result { text-align:center; padding:20px 0; }
      .quiz-result-score { font-size:3rem; font-weight:700; margin:12px 0; }
      .quiz-restart { padding:14px 32px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:14px; color:#fff; font-family:inherit; font-size:1rem; font-weight:600; cursor:pointer; margin-top:8px; }
    </style>
  `;

  function quizHTML() {
    return quizStyles + `
      <div class="quiz-wrap">
        <div class="quiz-progress"><div class="quiz-progress-fill" id="qpfill" style="width:${(current/shuffled.length)*100}%"></div></div>
        <div class="quiz-counter" id="qcounter">Frage ${current+1} von ${shuffled.length}</div>
        <div class="quiz-scores">
          <span class="qs-r">✅ ${richtig}</span>
          <span class="qs-t">⚡ ${teilweise}</span>
          <span class="qs-f">❌ ${falsch}</span>
        </div>
        <div class="quiz-frage">${shuffled[current].frage}</div>
        <textarea class="quiz-textarea" id="quiz-answer" placeholder="Schreibe hier deine Antwort..."></textarea>
        <button class="quiz-submit" id="quiz-submit" onclick="quizAbgeben()">✓ Antwort abgeben</button>
        <div class="quiz-feedback" id="quiz-feedback">
          <div class="quiz-verdict" id="quiz-verdict"></div>
          <div class="quiz-kw-found" id="quiz-kw-found"></div>
          <div class="quiz-kw-miss" id="quiz-kw-miss"></div>
          <div class="quiz-muster" id="quiz-muster"></div>
        </div>
        <button class="quiz-next" id="quiz-next" onclick="quizWeiter()">Weiter →</button>
      </div>
    `;
  }

  function resultHTML() {
    const total = shuffled.length;
    const pts = richtig + teilweise * 0.5;
    const pct = Math.round((pts/total)*100);
    const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '📚';
    const msg = pct >= 80 ? 'Sehr gut! Du kennst den Stoff!' : pct >= 50 ? 'Gut! Noch etwas üben.' : 'Weitermachen – du schaffst das!';
    return quizStyles + `
      <div class="quiz-wrap">
        <div class="quiz-result">
          <div style="font-size:3rem">${emoji}</div>
          <h2 style="margin:12px 0 4px">Quiz abgeschlossen!</h2>
          <div class="quiz-result-score gradient-text">${pct}%</div>
          <p style="color:var(--muted2);margin-bottom:20px">${msg}</p>
          <div class="quiz-scores" style="justify-content:center">
            <span class="qs-r">✅ ${richtig} Richtig</span>
            <span class="qs-t">⚡ ${teilweise} Teilweise</span>
            <span class="qs-f">❌ ${falsch} Falsch</span>
          </div>
          <button class="quiz-restart" onclick="renderQuiz(window._quizInhalt, window._quizBack)">🔄 Nochmal üben</button>
        </div>
      </div>
    `;
  }

  window._quizInhalt = inhalt;
  window._quizBack = backBtn;

  window.quizAbgeben = function() {
    const answer = document.getElementById('quiz-answer')?.value.trim();
    if (!answer || answer.length < 3) return;
    document.getElementById('quiz-submit').disabled = true;
    document.getElementById('quiz-answer').disabled = true;

    const { verdict, matched, missing } = bewerte(answer, shuffled[current]);
    if (verdict === 'richtig') richtig++;
    else if (verdict === 'teilweise') teilweise++;
    else falsch++;

    const icons = { richtig:'✅ Richtig!', teilweise:'⚡ Teilweise richtig', falsch:'❌ Falsch' };
    const fb = document.getElementById('quiz-feedback');
    fb.className = `quiz-feedback ${verdict}`;
    document.getElementById('quiz-verdict').textContent = icons[verdict];
    document.getElementById('quiz-kw-found').textContent = matched.length ? '✓ Erkannt: ' + matched.join(', ') : '';
    document.getElementById('quiz-kw-miss').textContent = missing.length ? '✗ Fehlend: ' + missing.join(', ') : '';
    document.getElementById('quiz-muster').innerHTML = `<strong>Musterantwort:</strong> ${shuffled[current].muster}`;
    fb.style.display = 'block';
    document.getElementById('quiz-next').style.display = 'block';
    document.getElementById('quiz-submit').style.display = 'none';
  };

  window.quizWeiter = function() {
    current++;
    if (current >= shuffled.length) {
      setDesktop(`<button class="btn btn-secondary btn-sm" onclick="showLernfeldDetail(window._quizInhalt.lernfeld_id)" style="margin-bottom:20px">${backBtn}</button>` + resultHTML());
      setMobile(`<button class="mob-back" onclick="showLernfeldDetail(window._quizInhalt.lernfeld_id)">${backBtn}</button>` + resultHTML());
      return;
    }
    const html = `<button class="btn btn-secondary btn-sm" onclick="showLernfeldDetail(window._quizInhalt.lernfeld_id)" style="margin-bottom:20px">${backBtn}</button><h1 style="margin-bottom:20px">${inhalt.titel}</h1>` + quizHTML();
    const mobHtml = `<button class="mob-back" onclick="showLernfeldDetail(window._quizInhalt.lernfeld_id)">${backBtn}</button><div style="font-size:1.1rem;font-weight:700;margin-bottom:16px">${inhalt.titel}</div>` + quizHTML();
    setDesktop(html);
    setMobile(mobHtml);
    // Re-enter support
    document.querySelectorAll('.quiz-textarea').forEach(ta => ta.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='Enter') quizAbgeben(); }));
  };

  const wrapDesktop = `<button class="btn btn-secondary btn-sm" onclick="showLernfeldDetail(${inhalt.lernfeld_id})" style="margin-bottom:20px">${backBtn}</button><h1 style="margin-bottom:20px">${inhalt.titel}</h1>` + quizHTML();
  const wrapMobile = `<button class="mob-back" onclick="showLernfeldDetail(${inhalt.lernfeld_id})">${backBtn}</button><div style="font-size:1.1rem;font-weight:700;margin-bottom:16px">${inhalt.titel}</div>` + quizHTML();
  setDesktop(wrapDesktop);
  setMobile(wrapMobile);
  document.querySelectorAll('.quiz-textarea').forEach(ta => ta.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='Enter') quizAbgeben(); }));
}

function qiValidate() {
  const raw = document.getElementById('qi-json').value.trim();
  const msgEl = document.getElementById('qi-validate-msg');
  const preview = document.getElementById('qi-preview');
  const saveBtn = document.getElementById('qi-save-btn');
  try {
    const data = JSON.parse(raw);
    if (!data.fragen || !Array.isArray(data.fragen) || !data.fragen.length) throw new Error('Kein "fragen"-Array gefunden.');
    data.fragen.forEach((f,i) => {
      if (!f.frage) throw new Error(`Frage ${i+1}: "frage" fehlt.`);
      if (!f.muster) throw new Error(`Frage ${i+1}: "muster" fehlt.`);
      if (!f.keywords || !f.keywords.length) throw new Error(`Frage ${i+1}: "keywords" fehlt.`);
    });
    msgEl.innerHTML = `<span style="color:var(--correct)">✅ ${data.fragen.length} Frage${data.fragen.length!==1?'n':''} erkannt</span>`;
    document.getElementById('qi-preview-content').innerHTML = data.fragen.map((f,i) => `
      <div style="padding:12px 0;${i>0?'border-top:1px solid var(--border)':''}">
        <div style="font-weight:600;font-size:0.9rem;margin-bottom:4px">Frage ${i+1}: ${f.frage.substring(0,70)}${f.frage.length>70?'...':''}</div>
        <div style="font-size:0.8rem;color:var(--muted2);margin-bottom:4px">Muster: ${f.muster.substring(0,80)}${f.muster.length>80?'...':''}</div>
        <div style="font-size:0.78rem;color:var(--accent)">${f.keywords.length} Keyword-Gruppen · mind. ${f.required||1} erkannt → ✅</div>
      </div>`).join('');
    preview.style.display = 'block'; saveBtn.style.display = 'inline-flex';
  } catch(e) {
    msgEl.innerHTML = `<span style="color:var(--danger)">❌ ${e.message}</span>`;
    preview.style.display = 'none'; saveBtn.style.display = 'none';
  }
}

async function qiSave() {
  const titel = document.getElementById('qi-titel').value.trim();
  const ziel = document.getElementById('qi-ziel').value;
  const raw = document.getElementById('qi-json').value.trim();
  const resultEl = document.getElementById('qi-result');
  if (!titel) return resultEl.innerHTML = '<div class="alert alert-error">Bitte einen Titel eingeben.</div>';
  let inhalt;
  try { inhalt = JSON.parse(raw); } catch { return resultEl.innerHTML = '<div class="alert alert-error">Ungültiges JSON.</div>'; }
  const btn = document.getElementById('qi-save-btn');
  btn.disabled = true; btn.textContent = 'Speichern...';
  let error;
  if (ziel.startsWith('lf-')) {
    ({ error } = await db.from('inhalte').insert({ lernfeld_id: ziel.replace('lf-',''), typ:'quiz', titel, inhalt, erstellt_von:USER.id }));
  } else {
    ({ error } = await db.from('fach_inhalte').insert({ kapitel_id: ziel.replace('fach-',''), typ:'quiz', titel, inhalt, erstellt_von:USER.id }));
  }
  btn.disabled = false; btn.textContent = '💾 Quiz speichern';
  if (error) return resultEl.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
  resultEl.innerHTML = '<div class="alert alert-success">✅ Quiz erfolgreich gespeichert!</div>';
  document.getElementById('qi-titel').value = '';
  document.getElementById('qi-json').value = '';
  document.getElementById('qi-preview').style.display = 'none';
  btn.style.display = 'none';
  setTimeout(() => resultEl.innerHTML = '', 3000);
}

function vokValidate() {
  const raw = document.getElementById('vok-csv').value.trim();
  const msgEl = document.getElementById('vok-validate-msg');
  const preview = document.getElementById('vok-preview');
  const saveBtn = document.getElementById('vok-save-btn');
  try {
    const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
    const start = lines[0].toLowerCase().startsWith('en') ? 1 : 0;
    const rows = lines.slice(start).map((line, i) => {
      const parts = line.split(',');
      if (parts.length < 2) throw new Error(`Zeile ${i+start+1}: Weniger als 2 Spalten.`);
      return { en: parts[0].trim(), de: parts[1].trim(), beispiel: parts.slice(2).join(',').trim() || '' };
    });
    if (!rows.length) throw new Error('Keine Vokabeln gefunden.');
    msgEl.innerHTML = `<span style="color:var(--correct)">✅ ${rows.length} Vokabeln erkannt</span>`;
    document.getElementById('vok-preview-content').innerHTML = `
      <div class="table-wrap"><table>
        <thead><tr><th>Englisch</th><th>Deutsch</th><th>Beispiel</th></tr></thead>
        <tbody>
          ${rows.slice(0,6).map(r=>`<tr><td><strong>${r.en}</strong></td><td>${r.de}</td><td style="color:var(--muted2);font-size:0.82rem">${r.beispiel||'–'}</td></tr>`).join('')}
          ${rows.length>6?`<tr><td colspan="3" style="color:var(--muted2);font-size:0.82rem;text-align:center">...und ${rows.length-6} weitere</td></tr>`:''}
        </tbody>
      </table></div>`;
    preview.style.display = 'block'; saveBtn.style.display = 'inline-flex';
    window._vokRows = rows;
  } catch(e) {
    msgEl.innerHTML = `<span style="color:var(--danger)">❌ ${e.message}</span>`;
    preview.style.display = 'none'; saveBtn.style.display = 'none';
  }
}

async function vokSave() {
  const kapId = parseInt(document.getElementById('vok-kapitel').value);
  const rows = window._vokRows;
  const resultEl = document.getElementById('vok-result');
  if (!rows || !rows.length) return resultEl.innerHTML = '<div class="alert alert-error">Bitte zuerst überprüfen.</div>';
  const btn = document.getElementById('vok-save-btn');
  btn.disabled = true; btn.textContent = 'Speichern...';
  const inserts = rows.map((r, i) => ({ kapitel_id: kapId, en: r.en, de: r.de, beispiel: r.beispiel||null, reihenfolge: i+1 }));
  const { error } = await db.from('vokabeln').insert(inserts);
  btn.disabled = false; btn.textContent = '💾 Vokabeln speichern';
  if (error) return resultEl.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
  resultEl.innerHTML = `<div class="alert alert-success">✅ ${rows.length} Vokabeln gespeichert!</div>`;
  document.getElementById('vok-csv').value = '';
  document.getElementById('vok-preview').style.display = 'none';
  btn.style.display = 'none'; window._vokRows = null;
  setTimeout(() => resultEl.innerHTML = '', 3000);
}

        <div style="display:flex;align-items:center;gap:12px">

    <div class="card" style="margin-bottom:10px;cursor:pointer" onclick="startVokabelTrainer(${kapitelId},${fachId},'de-en')">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:1.4rem">🇩🇪</span>
          <div><div style="font-weight:600">Deutsch → Englisch</div><div style="font-size:0.78rem;color:var(--muted2)">Siehst das deutsche Wort, tippst die Übersetzung</div></div>

    <div class="mob-inhalt-card" onclick="startVokabelTrainer(${kapitelId},${fachId},'en-de')">
      <div class="mob-inhalt-type">🇬🇧</div>
      <div style="flex:1"><div style="font-weight:600;font-size:0.9rem">Englisch → Deutsch</div></div>
      <span style="color:var(--muted)">›</span>
    </div>
    <div class="mob-inhalt-card" onclick="startVokabelTrainer(${kapitelId},${fachId},'de-en')">
      <div class="mob-inhalt-type">🇩🇪</div>
      <div style="flex:1"><div style="font-weight:600;font-size:0.9rem">Deutsch → Englisch</div></div>
      <span style="color:var(--muted)">›</span>

  const mobInhalte = (inhalte||[]).map(i => `
    <div class="mob-inhalt-card" onclick="showFachInhalt(${i.id},${kapitelId},${fachId})">
      <div class="mob-inhalt-type">${typeIcon[i.typ]||'📄'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:0.9rem">${i.titel}</div>
        <div style="font-size:0.75rem;color:var(--muted2)">${typeLabel[i.typ]||i.typ}</div>

  setDesktop(`
    <button class="btn btn-secondary btn-sm" onclick="showFach(${fachId})" style="margin-bottom:20px">← ${kap.faecher.name}</button>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
      <span style="font-size:1.8rem">${kap.faecher.icon}</span>
      <div>
        <div style="font-size:0.72rem;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:1px">${kap.faecher.name}</div>

    <div style="font-size:0.83rem;color:var(--muted2);margin-bottom:20px">${kap.beschreibung||''}</div>

// ── FACH-INHALT ANZEIGEN ──────────────────────────────────────
async function showFachInhalt(inhaltId, kapitelId, fachId) {
  const { data: i } = await db.from('fach_inhalte').select('*, fach_kapitel(id,name,faecher(name))').eq('id', inhaltId).maybeSingle();
  if (!i) return;
  const backBtn = `← ${i.fach_kapitel.name}`;

  if (i.typ === 'quiz') {
    // Quiz-Engine wiederverwenden (leicht angepasst für fach_fortschritt)
    renderFachQuiz(i, kapitelId, fachId);
  } else {
    const html = (i.inhalt?.text||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    setDesktop(`
      <button class="btn btn-secondary btn-sm" onclick="showKapitel(${kapitelId},${fachId})" style="margin-bottom:20px">${backBtn}</button>
      <h1 style="margin-bottom:20px">${i.titel}</h1>
      <div class="card"><div class="content-text">${html}</div></div>
      <div style="margin-top:16px">
        <button class="btn btn-success" onclick="markFachDone(${inhaltId},${kapitelId},${fachId})">✅ Als erledigt markieren</button>
      </div>
    `);
    setMobile(`
      <button class="mob-back" onclick="showKapitel(${kapitelId},${fachId})">${backBtn}</button>
      <div style="font-size:1.1rem;font-weight:700;margin-bottom:16px">${i.titel}</div>
      <div class="card" style="margin-bottom:16px"><div class="content-text" style="font-size:0.92rem;line-height:1.7">${html}</div></div>
      <button class="btn btn-success btn-full" onclick="markFachDone(${inhaltId},${kapitelId},${fachId})">✅ Als erledigt markieren</button>
    `);
  }
}

async function markFachDone(inhaltId, kapitelId, fachId) {
  await db.from('fach_fortschritt').upsert({ user_id:USER.id, inhalt_id:inhaltId, abgeschlossen:true, completed_at:new Date().toISOString() });
  showKapitel(kapitelId, fachId);
}

function renderFachQuiz(inhalt, kapitelId, fachId) {
  // Gleiche Engine wie renderQuiz(), nur Back-Navigation angepasst
  const fragen = inhalt.inhalt?.fragen || [];
  const shuffled = [...fragen].sort(() => Math.random() - 0.5);
  let current = 0, richtig = 0, teilweise = 0, falsch = 0;
  const backBtn = `← Zurück`;

  // Styles identisch mit renderQuiz
  const quizStyles = `<style>
    .quiz-wrap{max-width:620px}.quiz-progress{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:20px}
    .quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 0.4s}
    .quiz-counter{font-size:0.78rem;color:var(--muted2);margin-bottom:16px}.quiz-scores{display:flex;gap:14px;margin-bottom:20px;font-size:0.82rem}
    .qs-r{color:var(--correct);font-weight:600}.qs-t{color:var(--warning);font-weight:600}.qs-f{color:var(--danger);font-weight:600}
    .quiz-frage{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:14px;font-size:1rem;font-weight:600;line-height:1.5}
    .quiz-textarea{width:100%;min-height:100px;background:var(--surface);border:2px solid var(--border);border-radius:14px;color:var(--text);font-family:inherit;font-size:0.95rem;padding:14px;resize:none;outline:none;transition:border-color 0.2s;margin-bottom:12px;line-height:1.5}
    .quiz-textarea:focus{border-color:var(--accent)}.quiz-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:14px;color:#fff;font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;margin-bottom:12px}
    .quiz-submit:disabled{opacity:0.4;cursor:default}.quiz-feedback{border-radius:14px;padding:14px 16px;margin-bottom:12px;display:none;font-size:0.88rem;line-height:1.6}
    .quiz-feedback.richtig{background:#10b98115;border:1px solid #10b98144}.quiz-feedback.teilweise{background:#f59e0b15;border:1px solid #f59e0b44}.quiz-feedback.falsch{background:#ef444415;border:1px solid #ef444444}
    .quiz-verdict{font-weight:700;font-size:1rem;margin-bottom:6px}.richtig .quiz-verdict{color:var(--correct)}.teilweise .quiz-verdict{color:var(--warning)}.falsch .quiz-verdict{color:var(--danger)}
    .quiz-kw-found{color:#86efac;font-size:0.82rem;margin-bottom:4px}.quiz-kw-miss{color:#fca5a5;font-size:0.82rem;margin-bottom:8px}
    .quiz-muster{color:var(--muted2);font-size:0.82rem;border-top:1px solid var(--border);padding-top:8px;margin-top:8px}.quiz-muster strong{color:#7dd3fc}
    .quiz-next{width:100%;padding:14px;background:var(--surface2);border:1px solid var(--border2);border-radius:14px;color:var(--text);font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;display:none}
    .quiz-result{text-align:center;padding:20px 0}.quiz-result-score{font-size:3rem;font-weight:700;margin:12px 0}
    .quiz-restart{padding:14px 32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:14px;color:#fff;font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;margin-top:8px}
  </style>`;

  function quizHTML() {
    return quizStyles + `<div class="quiz-wrap">
      <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${(current/shuffled.length)*100}%"></div></div>
      <div class="quiz-counter">Frage ${current+1} von ${shuffled.length}</div>
      <div class="quiz-scores"><span class="qs-r">✅ ${richtig}</span><span class="qs-t">⚡ ${teilweise}</span><span class="qs-f">❌ ${falsch}</span></div>
      <div class="quiz-frage">${shuffled[current].frage}</div>
      <textarea class="quiz-textarea" id="quiz-answer" placeholder="Schreibe hier deine Antwort..."></textarea>
      <button class="quiz-submit" id="quiz-submit" onclick="quizAbgeben()">✓ Antwort abgeben</button>
      <div class="quiz-feedback" id="quiz-feedback">
        <div class="quiz-verdict" id="quiz-verdict"></div>
        <div class="quiz-kw-found" id="quiz-kw-found"></div>
        <div class="quiz-kw-miss" id="quiz-kw-miss"></div>
        <div class="quiz-muster" id="quiz-muster"></div>
      </div>
      <button class="quiz-next" id="quiz-next" onclick="quizWeiter()">Weiter →</button>
    </div>`;
  }

  function resultHTML() {
    const pts = richtig + teilweise * 0.5;
    const pct = Math.round((pts/shuffled.length)*100);
    const emoji = pct>=80?'🎉':pct>=50?'👍':'📚';
    const msg = pct>=80?'Sehr gut!':pct>=50?'Gut, noch üben.':'Weitermachen!';
    return quizStyles + `<div class="quiz-wrap"><div class="quiz-result">
      <div style="font-size:3rem">${emoji}</div>
      <h2 style="margin:12px 0 4px">Quiz abgeschlossen!</h2>
      <div class="quiz-result-score gradient-text">${pct}%</div>
      <p style="color:var(--muted2);margin-bottom:20px">${msg}</p>
      <div class="quiz-scores" style="justify-content:center">
        <span class="qs-r">✅ ${richtig}</span><span class="qs-t">⚡ ${teilweise}</span><span class="qs-f">❌ ${falsch}</span>
      </div>
      <button class="quiz-restart" onclick="renderFachQuiz(window._fachQuizInhalt,window._fachQuizKap,window._fachQuizFach)">🔄 Nochmal</button>
    </div></div>`;
  }

  window._fachQuizInhalt = inhalt; window._fachQuizKap = kapitelId; window._fachQuizFach = fachId;

  window.quizAbgeben = function() {
    const answer = document.getElementById('quiz-answer')?.value.trim();
    if (!answer || answer.length < 3) return;
    document.getElementById('quiz-submit').disabled = true;
    document.getElementById('quiz-answer').disabled = true;
    const { verdict, matched, missing } = bewerte(answer, shuffled[current]);
    if (verdict==='richtig') richtig++; else if (verdict==='teilweise') teilweise++; else falsch++;
    const icons = { richtig:'✅ Richtig!', teilweise:'⚡ Teilweise richtig', falsch:'❌ Falsch' };
    const fb = document.getElementById('quiz-feedback');
    fb.className = `quiz-feedback ${verdict}`;
    document.getElementById('quiz-verdict').textContent = icons[verdict];
    document.getElementById('quiz-kw-found').textContent = matched.length ? '✓ Erkannt: '+matched.join(', ') : '';
    document.getElementById('quiz-kw-miss').textContent = missing.length ? '✗ Fehlend: '+missing.join(', ') : '';
    document.getElementById('quiz-muster').innerHTML = `<strong>Musterantwort:</strong> ${shuffled[current].muster}`;
    fb.style.display='block'; document.getElementById('quiz-next').style.display='block'; document.getElementById('quiz-submit').style.display='none';
  };

  window.quizWeiter = function() {
    current++;
    if (current >= shuffled.length) {
      setDesktop(`<button class="btn btn-secondary btn-sm" onclick="showKapitel(${kapitelId},${fachId})" style="margin-bottom:20px">${backBtn}</button>` + resultHTML());
      setMobile(`<button class="mob-back" onclick="showKapitel(${kapitelId},${fachId})">${backBtn}</button>` + resultHTML());
      return;
    }
    const h = `<button class="btn btn-secondary btn-sm" onclick="showKapitel(${kapitelId},${fachId})" style="margin-bottom:20px">${backBtn}</button><h1 style="margin-bottom:20px">${inhalt.titel}</h1>` + quizHTML();
    setDesktop(h); setMobile(`<button class="mob-back" onclick="showKapitel(${kapitelId},${fachId})">${backBtn}</button><div style="font-size:1.1rem;font-weight:700;margin-bottom:16px">${inhalt.titel}</div>` + quizHTML());
    document.querySelectorAll('.quiz-textarea').forEach(ta => ta.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey)&&e.key==='Enter') quizAbgeben(); }));
  };

  const wD = `<button class="btn btn-secondary btn-sm" onclick="showKapitel(${kapitelId},${fachId})" style="margin-bottom:20px">${backBtn}</button><h1 style="margin-bottom:20px">${inhalt.titel}</h1>` + quizHTML();
  const wM = `<button class="mob-back" onclick="showKapitel(${kapitelId},${fachId})">${backBtn}</button><div style="font-size:1.1rem;font-weight:700;margin-bottom:16px">${inhalt.titel}</div>` + quizHTML();
  setDesktop(wD); setMobile(wM);
  document.querySelectorAll('.quiz-textarea').forEach(ta => ta.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey)&&e.key==='Enter') quizAbgeben(); }));
}

// ── VOKABEL TRAINER ───────────────────────────────────────────
async function startVokabelTrainer(kapitelId, fachId, richtung) {
  setDesktop('<div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>');
  setMobile('<div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>');

  const { data: vokabeln } = await db.from('vokabeln').select('*').eq('kapitel_id', kapitelId).order('reihenfolge');
  const { data: fortschritt } = await db.from('vokabel_fortschritt').select('*').eq('user_id', USER.id);
  if (!vokabeln || !vokabeln.length) return;

  const fpMap = {};
  (fortschritt||[]).forEach(f => { fpMap[f.vokabel_id] = f; });

  const shuffled = [...vokabeln].sort(() => Math.random() - 0.5);
  let current = 0, richtig = 0, falsch = 0;
  let revealed = false;

  const trainerStyles = `<style>
    .vt-wrap{max-width:560px}
    .vt-progress{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:16px}
    .vt-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 0.4s}
    .vt-counter{font-size:0.78rem;color:var(--muted2);margin-bottom:20px}
    .vt-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 28px;text-align:center;margin-bottom:20px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .vt-lang{font-size:0.72rem;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
    .vt-word{font-size:1.6rem;font-weight:700;margin-bottom:8px}
    .vt-example{font-size:0.82rem;color:var(--muted2);font-style:italic;margin-top:6px}
    .vt-answer-area{margin-bottom:16px}
    .vt-input{width:100%;background:var(--surface2);border:2px solid var(--border2);border-radius:14px;color:var(--text);font-family:inherit;font-size:1rem;padding:14px;outline:none;transition:border-color 0.2s;text-align:center}
    .vt-input:focus{border-color:var(--accent)}
    .vt-input.correct{border-color:var(--correct);background:#10b98110}
    .vt-input.wrong{border-color:var(--danger);background:#ef444410}
    .vt-feedback{padding:12px 16px;border-radius:12px;margin-bottom:14px;font-size:0.88rem;display:none;text-align:center}
    .vt-feedback.correct{background:#10b98115;border:1px solid #10b98144;color:var(--correct)}
    .vt-feedback.wrong{background:#ef444415;border:1px solid #ef444444;color:#fca5a5}
    .vt-btn-row{display:flex;gap:10px}
    .vt-btn{flex:1;padding:13px;border:none;border-radius:14px;font-family:inherit;font-size:0.95rem;font-weight:600;cursor:pointer}
    .vt-btn-check{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
    .vt-btn-next{background:var(--surface2);border:1px solid var(--border2);color:var(--text);display:none}
    .vt-scores{display:flex;gap:16px;margin-bottom:20px;font-size:0.85rem}
    .vt-score-r{color:var(--correct);font-weight:600}
    .vt-score-f{color:var(--danger);font-weight:600}
    .vt-result{text-align:center;padding:20px 0}
    .vt-result-score{font-size:3rem;font-weight:700;margin:12px 0}
  </style>`;

  function cardHTML() {
    const v = shuffled[current];
    const frageWort = richtung === 'en-de' ? v.en : v.de;
    const frageLang = richtung === 'en-de' ? '🇬🇧 Englisch' : '🇩🇪 Deutsch';
    const antwortLang = richtung === 'en-de' ? '🇩🇪 Auf Deutsch' : '🇬🇧 In English';
    const fp = fpMap[v.id];
    const streak = fp ? `<span style="font-size:0.75rem;color:var(--muted2);margin-left:8px">✅ ${fp.richtig_count}× richtig</span>` : '';

    return trainerStyles + `<div class="vt-wrap">
      <div class="vt-progress"><div class="vt-progress-fill" style="width:${(current/shuffled.length)*100}%"></div></div>
      <div class="vt-counter">Vokabel ${current+1} von ${shuffled.length} ${streak}</div>
      <div class="vt-scores"><span class="vt-score-r">✅ ${richtig} richtig</span><span class="vt-score-f">❌ ${falsch} falsch</span></div>
      <div class="vt-card">
        <div class="vt-lang">${frageLang}</div>
        <div class="vt-word">${frageWort}</div>
        ${v.beispiel && richtung==='de-en' ? `<div class="vt-example">"${v.beispiel}"</div>` : ''}
      </div>
      <div class="vt-answer-area">
        <div style="font-size:0.78rem;color:var(--muted2);margin-bottom:8px;text-align:center">${antwortLang}</div>
        <input class="vt-input" type="text" id="vt-input" placeholder="Deine Übersetzung..." autocomplete="off">
      </div>
      <div class="vt-feedback" id="vt-feedback"></div>
      <div class="vt-btn-row">
        <button class="vt-btn vt-btn-check" id="vt-check" onclick="vtCheck()">✓ Überprüfen</button>
        <button class="vt-btn vt-btn-next" id="vt-next" onclick="vtNext()">Weiter →</button>
      </div>
    </div>`;
  }

  function resultHTML() {
    const pct = Math.round((richtig/shuffled.length)*100);
    const emoji = pct>=80?'🎉':pct>=50?'👍':'📚';
    return trainerStyles + `<div class="vt-wrap"><div class="vt-result">
      <div style="font-size:3rem">${emoji}</div>
      <h2 style="margin:12px 0 4px">Training abgeschlossen!</h2>
      <div class="vt-result-score gradient-text">${pct}%</div>
      <p style="color:var(--muted2);margin-bottom:20px">${richtig} von ${shuffled.length} Vokabeln richtig</p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-primary" onclick="startVokabelTrainer(${kapitelId},${fachId},'${richtung}')">🔄 Nochmal</button>
        <button class="btn btn-secondary" onclick="showKapitel(${kapitelId},${fachId})">← Zurück</button>
      </div>
    </div></div>`;
  }

  function renderCard() {
    const backBtn = `<button class="btn btn-secondary btn-sm" onclick="showKapitel(${kapitelId},${fachId})" style="margin-bottom:20px">← Zurück</button>`;
    const mobBack = `<button class="mob-back" onclick="showKapitel(${kapitelId},${fachId})">← Zurück</button>`;
    const title = `<h1 style="margin-bottom:20px">${richtung==='en-de'?'🇬🇧 Englisch → Deutsch':'🇩🇪 Deutsch → Englisch'}</h1>`;
    setDesktop(backBtn + title + cardHTML());
    setMobile(mobBack + `<div style="font-size:1.1rem;font-weight:700;margin-bottom:16px">${richtung==='en-de'?'🇬🇧 Englisch → Deutsch':'🇩🇪 Deutsch → Englisch'}</div>` + cardHTML());
    const inp = document.getElementById('vt-input');
    if (inp) { inp.focus(); inp.addEventListener('keydown', e => { if (e.key==='Enter') { if (!revealed) vtCheck(); else vtNext(); } }); }
  }

  window.vtCheck = function() {
    const v = shuffled[current];
    const answer = document.getElementById('vt-input')?.value.trim().toLowerCase() || '';
    const correct = (richtung==='en-de' ? v.de : v.en).toLowerCase();
    // Flexible Prüfung: akzeptiert Teilantworten (z.B. "Lager" für "Lager / Lagerhalle")
    const variants = correct.split(/[\/,;]/).map(s => s.trim().toLowerCase()).filter(Boolean);
    const isCorrect = variants.some(variant => answer.includes(variant) || variant.includes(answer)) && answer.length >= 2;

    revealed = true;
    const inp = document.getElementById('vt-input');
    const fb = document.getElementById('vt-feedback');
    if (isCorrect) {
      richtig++;
      inp.classList.add('correct');
      fb.className = 'vt-feedback correct';
      fb.textContent = '✅ Richtig! ' + (richtung==='en-de' ? v.de : v.en);
      // Fortschritt speichern
      db.from('vokabel_fortschritt').upsert({ user_id:USER.id, vokabel_id:v.id, richtig_count:(fpMap[v.id]?.richtig_count||0)+1, falsch_count:fpMap[v.id]?.falsch_count||0, zuletzt_gelernt:new Date().toISOString() }, { onConflict:'user_id,vokabel_id' });
    } else {
      falsch++;
      inp.classList.add('wrong');
      fb.className = 'vt-feedback wrong';
      fb.innerHTML = `❌ Falsch. Richtig wäre: <strong style="color:var(--text)">${richtung==='en-de'?v.de:v.en}</strong>`;
      db.from('vokabel_fortschritt').upsert({ user_id:USER.id, vokabel_id:v.id, richtig_count:fpMap[v.id]?.richtig_count||0, falsch_count:(fpMap[v.id]?.falsch_count||0)+1, zuletzt_gelernt:new Date().toISOString() }, { onConflict:'user_id,vokabel_id' });
    }
    fb.style.display = 'block';
    if (v.beispiel && richtung==='en-de') fb.innerHTML += `<div style="margin-top:6px;font-size:0.8rem;color:var(--muted2);font-style:italic">"${v.beispiel}"</div>`;
    document.getElementById('vt-check').style.display = 'none';
    document.getElementById('vt-next').style.display = 'block';
    inp.disabled = true;
  };

  window.vtNext = function() {
    current++;
    revealed = false;
    if (current >= shuffled.length) {
      const backBtn = `<button class="btn btn-secondary btn-sm" onclick="showKapitel(${kapitelId},${fachId})" style="margin-bottom:20px">← Zurück</button>`;
      setDesktop(backBtn + resultHTML());
      setMobile(`<button class="mob-back" onclick="showKapitel(${kapitelId},${fachId})">← Zurück</button>` + resultHTML());
      return;
    }
    renderCard();
  };

  renderCard();
}

async function toggleLF(lfId, value) {
  const { error } = await db.from('lernfelder').update({ freigeschaltet:value }).eq('id', lfId);
  if (error) alert('Fehler: ' + error.message);
}

async function changeRole(userId, newRole) {
  const { error } = await db.from('profiles').update({ role:newRole }).eq('id', userId);
  const els = document.querySelectorAll('#role-msg');
  const msg = error ? `<div class="alert alert-error">Fehler: ${error.message}</div>` : `<div class="alert alert-success">Rolle geändert ✅</div>`;
  els.forEach(el => { el.innerHTML = msg; setTimeout(() => el.innerHTML = '', 3000); });
}
</script>

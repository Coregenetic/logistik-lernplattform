<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard – Lernplattform Logistik</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ── BASIS UPGRADES ────────────────────────────── */
:root {
  --sidebar-width: 260px;
  --header-height: 64px;
}

/* ── TOGGLE ─────────────────────────────────────── */
.lf-locked { opacity:0.45; cursor:not-allowed; position:relative; }
.lf-locked::after { content:'🔒'; position:absolute; top:12px; right:12px; font-size:1rem; }
.toggle { position:relative; width:40px; height:22px; cursor:pointer; display:inline-block; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; inset:0; background:var(--border2); border-radius:99px; transition:0.2s; }
.toggle-slider:before { content:''; position:absolute; width:16px; height:16px; left:3px; top:3px; background:#fff; border-radius:50%; transition:0.2s; }
input:checked + .toggle-slider { background:var(--correct); }
input:checked + .toggle-slider:before { transform:translateX(18px); }

/* ── MOBILE BOTTOM NAV ──────────────────────────── */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom);
}
.bottom-nav-inner { display: flex; height: 60px; }
.bn-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; border: none; background: none; color: var(--muted); font-family: inherit;
  font-size: 0.7rem; font-weight: 500; cursor: pointer; transition: 0.2s;
}
.bn-item.active { color: var(--accent); }
.bn-icon { font-size: 1.4rem; line-height: 1; }

/* ── MOBILE HEADER ──────────────────────────────── */
.mob-header {
  display: none; position: sticky; top: 0; z-index: 100;
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 16px; height: 56px; align-items: center; justify-content: space-between;
}
.mob-header-brand { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; }
.mob-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; font-weight: 700; color: #fff; border: none;
}

/* ── CATEGORY HEADERS & DESIGN ─────────────────── */
.category-section { margin-bottom: 32px; }
.category-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--bg); padding: 12px 0;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; border-bottom: 1px solid transparent;
}
.category-header.sticky { border-color: var(--border); background: var(--surface); padding: 12px 16px; margin: 0 -16px 16px; }
.category-title { font-size: 1.1rem; font-weight: 700; color: var(--text); flex: 1; }
.category-badge { font-size: 0.7rem; background: var(--surface2); color: var(--muted); padding: 4px 10px; border-radius: 99px; }

/* ── STEP CARDS ─────────────────────────────────── */
.step-card {
  display: flex; align-items: center; gap: 16px; background: var(--surface);
  border: 1px solid var(--border); padding: 18px; border-radius: 16px;
  margin-bottom: 12px; cursor: pointer; transition: all 0.2s ease;
  position: relative; overflow: hidden;
}
.step-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.step-card.done { border-color: var(--correct-light); }
.step-number {
  width: 36px; height: 36px; border-radius: 12px;
  background: var(--surface2); color: var(--muted2);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.9rem; flex-shrink: 0;
}
.step-card.done .step-number { background: var(--correct); color: #fff; }

/* ── IFRAME ─────────────────────────────────────── */
.iframe-container {
  width: 100%; height: 75vh; border: 1px solid var(--border);
  border-radius: 20px; background: #fff; overflow: hidden; position: relative;
}
.iframe-container iframe { width: 100%; height: 100%; border: none; }
.exit-fs-btn { display: none; position: absolute; top: 20px; right: 20px; z-index: 999; }
.iframe-container:fullscreen .exit-fs-btn { display: flex; }

/* ── ACCORDION ──────────────────────────────────── */
.accordion { border: 1px solid var(--border); border-radius: 16px; margin-bottom: 12px; overflow: hidden; background: var(--surface); }
.accordion-header { padding: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
.accordion-body { display: none; background: var(--bg); border-top: 1px solid var(--border); }
.accordion.open .accordion-body { display: block; }

/* ── RESPONSIVE ─────────────────────────────────── */
@media (min-width: 701px) {
  .mob-header, .mob-main, .bottom-nav { display: none !important; }
  .navbar, .layout { display: flex !important; }
}
@media (max-width: 700px) {
  .navbar, .layout { display: none !important; }
  .mob-header { display: flex !important; }
  .mob-main { display: block !important; padding: 16px 16px 100px; }
  .bottom-nav { display: block !important; }
}
</style>
</head>
<body>

<!-- ── DESKTOP NAVBAR ─────────────────────────── -->
<nav class="navbar">
  <div class="navbar-brand gradient-text">🚛 Lernplattform Logistik</div>
  <div class="navbar-nav">
    <span class="nav-user">
      <span id="nav-name" style="font-size:0.88rem; font-weight:600"></span>
      <span id="nav-badge"></span>
    </span>
    <button class="btn btn-secondary btn-sm" id="btn-logout">Abmelden</button>
  </div>
</nav>

<!-- ── DESKTOP LAYOUT ─────────────────────────── -->
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<!-- ── MOBILE HEADER ──────────────────────────── -->
<div class="mob-header">
  <div class="mob-header-brand gradient-text">🚛 Logistik Lernportal</div>
  <div class="mob-header-right" style="display:flex; gap:10px; align-items:center">
    <span id="mob-badge"></span>
    <button class="mob-avatar" id="mob-avatar"></button>
  </div>
</div>

<!-- ── MOBILE MAIN ────────────────────────────── -->
<div class="mob-main" id="mob-main"></div>

<!-- ── BOTTOM NAV ─────────────────────────────── -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner" id="bottom-nav"></div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let USER = null, PROFILE = null, KATEGORIEN = [];

// ── INIT ─────────────────────────────────────────
db.auth.getSession().then(async ({ data: { session } }) => {
  if (!session) return window.location.href = 'index.html';
  USER = session.user;
  
  // Profile & Kategorien laden
  const [profileRes, katRes] = await Promise.all([
    db.from('profiles').select('*').eq('id', USER.id).maybeSingle(),
    db.from('kategorien').select('*').order('name')
  ]);

  PROFILE = profileRes.data;
  KATEGORIEN = katRes.data || [];
  
  if (!PROFILE) return window.location.href = 'index.html';

  setupUI();
  showHome();
});

function setupUI() {
  const roleColors = { admin:'badge-admin', mod:'badge-mod', user:'badge-user' };
  const initials = PROFILE.username.substring(0,2).toUpperCase();

  document.getElementById('nav-name').textContent = PROFILE.username;
  document.getElementById('nav-badge').innerHTML = `<span class="badge ${roleColors[PROFILE.role]}">${PROFILE.role}</span>`;
  document.getElementById('mob-badge').innerHTML = `<span class="badge ${roleColors[PROFILE.role]}">${PROFILE.role}</span>`;
  document.getElementById('mob-avatar').textContent = initials;
  document.getElementById('mob-avatar').onclick = () => { if (confirm('Abmelden?')) { db.auth.signOut(); window.location.href = 'index.html'; } };

  buildSidebar();
  buildBottomNav();
}

document.getElementById('btn-logout').addEventListener('click', async () => { await db.auth.signOut(); window.location.href = 'index.html'; });

// ── NAVIGATION BUILDERS ──────────────────────────
function buildSidebar() {
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const isAdmin = PROFILE.role === 'admin';
  document.getElementById('sidebar').innerHTML = `
    <div class="sidebar-title">Menü</div>
    <button class="sidebar-link active" id="lnk-home" onclick="showHome()"><span class="sidebar-icon">🏠</span>Dashboard</button>
    <button class="sidebar-link" id="lnk-lf" onclick="showLernfelder()"><span class="sidebar-icon">📚</span>Lernfelder</button>
    <button class="sidebar-link" id="lnk-fp" onclick="showFortschritt()"><span class="sidebar-icon">📊</span>Fortschritt</button>
    ${isMod ? `<div class="sidebar-title" style="margin-top:20px">Redaktion</div>
    <button class="sidebar-link" id="lnk-inhalte" onclick="showInhalte()"><span class="sidebar-icon">✏️</span>Inhalte pflegen</button>` : ''}
    ${isAdmin ? `<button class="sidebar-link" id="lnk-admin" onclick="showAdmin()"><span class="sidebar-icon">⚙️</span>Verwaltung</button>` : ''}
  `;
}

function buildBottomNav() {
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const items = [
    { id:'bn-home', icon:'🏠', label:'Start', fn:'showHome()' },
    { id:'bn-lf', icon:'📚', label:'Lernen', fn:'showLernfelder()' },
    { id:'bn-fp', icon:'📊', label:'Erfolg', fn:'showFortschritt()' },
    ...(isMod ? [{ id:'bn-inhalte', icon:'✏️', label:'Edit', fn:'showInhalte()' }] : []),
  ];
  document.getElementById('bottom-nav').innerHTML = items.map(i => `
    <button class="bn-item" id="${i.id}" onclick="${i.fn}"><span class="bn-icon">${i.icon}</span><span>${i.label}</span></button>
  `).join('');
}

function setActive(dId, mId) {
  document.querySelectorAll('.sidebar-link, .bn-item').forEach(l => l.classList.remove('active'));
  if (dId) document.getElementById(dId)?.classList.add('active');
  if (mId) document.getElementById(mId)?.classList.add('active');
}

// ── DASHBOARD HOME ───────────────────────────────
async function showHome() {
  setActive('lnk-home', 'bn-home');
  const [{ count: lfCount }, { count: inhCount }, { count: fpCount }, { data: recentLf }] = await Promise.all([
    db.from('lernfelder').select('*', { count:'exact', head:true }),
    db.from('inhalte').select('*', { count:'exact', head:true }),
    db.from('fortschritt').select('*', { count:'exact', head:true }).eq('user_id', USER.id).eq('abgeschlossen', true),
    db.from('lernfelder').select('*').order('nummer').limit(4)
  ]);

  const htmlD = `
    <h1 style="margin-bottom:8px">Guten Tag, <span class="gradient-text">${PROFILE.username}</span> 👋</h1>
    <p style="color:var(--muted2); margin-bottom:32px">Bereit für eine neue Lerneinheit?</p>
    <div class="grid-3" style="margin-bottom:40px">
      <div class="stat-card"><div class="stat-value gradient-text">${lfCount||0}</div><div class="stat-label">Lernfelder</div></div>
      <div class="stat-card"><div class="stat-value gradient-text">${inhCount||0}</div><div class="stat-label">Inhalte</div></div>
      <div class="stat-card"><div class="stat-value gradient-text">${fpCount||0}</div><div class="stat-label">Erledigt</div></div>
    </div>
    <h2 style="margin-bottom:16px">Deine Lernbereiche</h2>
    <div class="grid-2">${recentLf.map(lf => lfCard(lf, ['admin','mod'].includes(PROFILE.role))).join('')}</div>
  `;
  document.getElementById('main').innerHTML = htmlD;

  const htmlM = `
    <div class="mob-greeting">Hallo, <span class="gradient-text">${PROFILE.username}</span></div>
    <div class="mob-greeting-sub">Weiter geht's mit dem Lernen!</div>
    <div class="mob-stats">
      <div class="mob-stat"><div class="mob-stat-val gradient-text">${lfCount||0}</div><div class="mob-stat-lbl">Bereiche</div></div>
      <div class="mob-stat"><div class="mob-stat-val gradient-text">${fpCount||0}</div><div class="mob-stat-lbl">Erledigt</div></div>
    </div>
    <div class="mob-section">Schnellstart</div>
    ${recentLf.map(lf => mobLfCard(lf, ['admin','mod'].includes(PROFILE.role))).join('')}
  `;
  document.getElementById('mob-main').innerHTML = htmlM;
}

// ── LERNFELDER ÜBERSICHT ──────────────────────────
async function showLernfelder() {
  setActive('lnk-lf', 'bn-lf');
  const { data: bereiche } = await db.from('lernbereiche').select('*, lernfelder(*)').order('reihenfolge');
  const isMod = ['admin','mod'].includes(PROFILE.role);

  const renderBereich = (b, mobile = false) => `
    <div style="margin-bottom:32px">
      <h2 style="margin-bottom:12px; display:flex; align-items:center; gap:10px">${b.icon} ${b.name}</h2>
      <div class="${mobile ? '' : 'grid-3'}">
        ${b.lernfelder.sort((a,z)=>a.nummer-z.nummer).map(lf => mobile ? mobLfCard(lf, isMod) : lfCard(lf, isMod)).join('')}
      </div>
    </div>
  `;

  document.getElementById('main').innerHTML = `<h1>📚 Lerninhalte</h1><p style="margin-bottom:32px; color:var(--muted2)">Alle Lernfelder im Überblick</p>${bereiche.map(b => renderBereich(b)).join('')}`;
  document.getElementById('mob-main').innerHTML = `<div class="mob-section">Bibliothek</div>${bereiche.map(b => renderBereich(b, true)).join('')}`;
}

// ── LERNFELD DETAIL (KATEGORISIERT) ───────────────
async function showLernfeldDetail(lfId) {
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const [{ data: lf }, { data: inhalte }, { data: progress }] = await Promise.all([
    db.from('lernfelder').select('*, lernbereiche(name)').eq('id', lfId).maybeSingle(),
    db.from('inhalte').select('*, kategorien(name, icon)').eq('lernfeld_id', lfId).order('reihenfolge'),
    db.from('fortschritt').select('inhalt_id').eq('user_id', USER.id).eq('abgeschlossen', true)
  ]);

  if (!lf) return;
  const doneIds = progress.map(p => p.inhalt_id);

  // Gruppierung nach Kategorie
  const groups = {};
  inhalte.forEach(i => {
    const katName = i.kategorien?.name || 'Allgemein';
    if (!groups[katName]) groups[katName] = { icon: i.kategorien?.icon || '📁', items: [] };
    groups[katName].items.push(i);
  });

  const renderList = (mobile = false) => {
    let html = '';
    for (const [name, data] of Object.entries(groups)) {
      const doneInGroup = data.items.filter(item => doneIds.includes(item.id)).length;
      html += `
        <div class="category-section">
          <div class="category-header">
            <span style="font-size:1.2rem">${data.icon}</span>
            <div class="category-title">${name}</div>
            <div class="category-badge">${doneInGroup} / ${data.items.length}</div>
          </div>
          ${data.items.map((i, idx) => `
            <div class="step-card ${doneIds.includes(i.id) ? 'done' : ''}" onclick="showInhalt(${i.id}, ${lfId})">
              <div class="step-number">${doneIds.includes(i.id) ? '✓' : idx + 1}</div>
              <div style="flex:1">
                <div style="font-weight:600; font-size:${mobile ? '0.9rem' : '1rem'}">${i.titel}</div>
                <div style="font-size:0.75rem; color:var(--muted2); margin-top:2px; text-transform:uppercase">${i.typ}</div>
              </div>
              <div style="color:var(--accent)">→</div>
            </div>
          `).join('')}
        </div>
      `;
    }
    return html || '<p>Noch keine Inhalte vorhanden.</p>';
  };

  const header = `
    <button class="btn btn-secondary btn-sm" onclick="showLernfelder()" style="margin-bottom:20px">← Übersicht</button>
    <div style="display:flex; align-items:center; gap:16px; margin-bottom:24px">
      <div style="font-size:2.5rem">${lf.icon}</div>
      <div>
        <div style="color:var(--accent); font-weight:700; font-size:0.75rem; text-transform:uppercase">LF ${lf.nummer}</div>
        <h1 style="margin:0">${lf.name}</h1>
      </div>
    </div>
  `;

  document.getElementById('main').innerHTML = header + renderList();
  document.getElementById('mob-main').innerHTML = `<button class="mob-back" onclick="showLernfelder()">← Zurück</button>` + renderList(true);
}

// ── INHALT ANZEIGEN ───────────────────────────────
async function showInhalt(inhaltId, lfId) {
  const { data: i } = await db.from('inhalte').select('*, lernfelder(id,nummer,name)').eq('id', inhaltId).single();
  
  let viewer = '';
  if (i.typ === 'html') {
    viewer = `
      <div class="iframe-container" id="fs-wrapper">
        <button class="btn btn-danger exit-fs-btn" onclick="document.exitFullscreen()">✖ Beenden</button>
        <iframe src="${i.inhalt.text}"></iframe>
      </div>
      <button class="btn btn-secondary btn-sm" style="margin-top:10px" onclick="document.getElementById('fs-wrapper').requestFullscreen()">🔲 Vollbild</button>
    `;
  } else {
    viewer = `<div class="card" style="line-height:1.6; font-size:1rem">${(i.inhalt.text||'').replace(/\n/g,'<br>')}</div>`;
  }

  const actions = `<div style="margin-top:24px"><button class="btn btn-success" onclick="markDone(${i.id}, ${lfId})">✅ Als erledigt markieren</button></div>`;

  document.getElementById('main').innerHTML = `<button class="btn btn-secondary btn-sm" onclick="showLernfeldDetail(${lfId})" style="margin-bottom:20px">← Zurück</button><h1>${i.titel}</h1>${viewer}${actions}`;
  document.getElementById('mob-main').innerHTML = `<button class="mob-back" onclick="showLernfeldDetail(${lfId})">← Zurück</button><h3>${i.titel}</h3>${viewer}${actions}`;
}

async function markDone(id, lfId) {
  await db.from('fortschritt').upsert({ user_id: USER.id, inhalt_id: id, abgeschlossen: true, completed_at: new Date().toISOString() });
  showLernfeldDetail(lfId);
}

// ── INHALTE VERWALTEN (MOD+) ──────────────────────
async function showInhalte() {
  setActive('lnk-inhalte', 'bn-inhalte');
  const [{ data: lf }, { data: inh }] = await Promise.all([
    db.from('lernfelder').select('*').order('nummer'),
    db.from('inhalte').select('*, kategorien(name)').order('reihenfolge')
  ]);

  const renderForm = (target, existing = null) => {
    const isEdit = !!existing;
    const currentLf = existing ? existing.lernfeld_id : lf[0]?.id;
    const currentKat = existing ? existing.kategorie_id : KATEGORIEN[0]?.id;

    document.getElementById(target).innerHTML = `
      <div class="card" style="margin-bottom:24px; border-left:4px solid var(--accent)">
        <h3 style="margin-bottom:16px">${isEdit ? 'Inhalt bearbeiten' : 'Neuer Inhalt'}</h3>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Lernfeld</label>
            <select class="form-input" id="f-lf">${lf.map(l=>`<option value="${l.id}" ${l.id==currentLf?'selected':''}>LF ${l.nummer}: ${l.name}</option>`).join('')}</select>
          </div>
          <div class="form-group"><label class="form-label">Kategorie</label>
            <select class="form-input" id="f-kat">${KATEGORIEN.map(k=>`<option value="${k.id}" ${k.id==currentKat?'selected':''}>${k.icon} ${k.name}</option>`).join('')}</select>
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Titel</label><input type="text" class="form-input" id="f-titel" value="${existing?.titel||''}"></div>
          <div class="form-group"><label class="form-label">Typ</label>
            <select class="form-input" id="f-typ">
              <option value="html" ${existing?.typ==='html'?'selected':''}>HTML Datei</option>
              <option value="text" ${existing?.typ==='text'?'selected':''}>Text/Lektion</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Inhalt / Pfad</label><textarea class="form-input" id="f-text" rows="3">${existing?.inhalt?.text||''}</textarea></div>
        <div style="display:flex; gap:10px">
          <button class="btn btn-primary" onclick="saveInhalt(${isEdit}, ${existing?.id})">Speichern</button>
          <button class="btn btn-secondary" onclick="showInhalte()">Abbrechen</button>
        </div>
      </div>
    `;
  };

  const listHtml = lf.map(l => {
    const lInh = inh.filter(i => i.lernfeld_id === l.id);
    return `
      <div class="accordion" id="acc-${l.id}">
        <div class="accordion-header" onclick="toggleAcc(${l.id})">
          <span>LF ${l.nummer}: ${l.name} (${lInh.length})</span>
          <span>▼</span>
        </div>
        <div class="accordion-body">
          ${lInh.map(i => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border)">
              <div>
                <div style="font-weight:600">${i.titel}</div>
                <div style="font-size:0.7rem; color:var(--muted)">${i.kategorien?.name || 'Keine Kat.'} • ${i.typ}</div>
              </div>
              <div style="display:flex; gap:5px">
                <button class="btn btn-secondary btn-sm" onclick="editInh(${i.id})">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="deleteInh(${i.id})">🗑</button>
              </div>
            </div>
          `).join('') || '<div style="padding:15px">Keine Inhalte</div>'}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
      <h1>Inhalte bearbeiten</h1>
      <button class="btn btn-primary" onclick="window.scrollTo(0,0); document.getElementById('f-wrap').innerHTML=''; renderF()">+ Neu</button>
    </div>
    <div id="f-wrap"></div>${listHtml}
  `;
  window.renderF = () => renderForm('f-wrap');
  window.editInh = async (id) => { const {data} = await db.from('inhalte').select('*').eq('id',id).single(); renderForm('f-wrap', data); window.scrollTo(0,0); };
}

async function saveInhalt(isEdit, id) {
  const payload = {
    lernfeld_id: document.getElementById('f-lf').value,
    kategorie_id: document.getElementById('f-kat').value,
    titel: document.getElementById('f-titel').value,
    typ: document.getElementById('f-typ').value,
    inhalt: { text: document.getElementById('f-text').value }
  };
  if (isEdit) await db.from('inhalte').update(payload).eq('id', id);
  else await db.from('inhalte').insert({ ...payload, erstellt_von: USER.id });
  showInhalte();
}

async function deleteInh(id) { if(confirm('Löschen?')) { await db.from('inhalte').delete().eq('id', id); showInhalte(); } }
function toggleAcc(id) { document.getElementById('acc-'+id).classList.toggle('open'); }

// ── HELPERS ──────────────────────────────────────
function lfCard(lf, isMod) {
  const locked = !lf.freigeschaltet && !isMod;
  return `
    <div class="lf-card ${locked?'lf-locked':''}" onclick="${!locked?`showLernfeldDetail(${lf.id})`:''}">
      <div class="lf-card-icon">${lf.icon}</div>
      <div class="lf-card-num">LF ${lf.nummer}</div>
      <div class="lf-card-name">${lf.name}</div>
    </div>
  `;
}
function mobLfCard(lf, isMod) {
  const locked = !lf.freigeschaltet && !isMod;
  return `
    <div class="mob-lf-card ${locked?'locked':''}" onclick="${!locked?`showLernfeldDetail(${lf.id})`:''}" style="margin-bottom:10px">
      <div class="mob-lf-icon-wrap">${lf.icon}</div>
      <div class="mob-lf-info">
        <div class="mob-lf-num">LF ${lf.nummer}</div>
        <div class="mob-lf-name">${lf.name}</div>
      </div>
      <div class="mob-lf-arrow">${locked?'🔒':'›'}</div>
    </div>
  `;
}

// ── ADMIN & FORTSCHRITT (Platzhalter aus Original) ──
async function showFortschritt() {
  setActive('lnk-fp', 'bn-fp');
  const { data: fp } = await db.from('fortschritt').select('*, inhalte(titel, lernfelder(nummer))').eq('user_id', USER.id).eq('abgeschlossen', true);
  const rows = (fp||[]).map(f => `<tr><td>LF ${f.inhalte?.lernfelder?.nummer}</td><td>${f.inhalte?.titel}</td><td>${new Date(f.completed_at).toLocaleDateString()}</td></tr>`).join('');
  document.getElementById('main').innerHTML = `<h1>📊 Mein Fortschritt</h1><div class="table-wrap"><table><thead><tr><th>LF</th><th>Inhalt</th><th>Datum</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

async function showAdmin() {
  setActive('lnk-admin', null);
  document.getElementById('main').innerHTML = `<h1>⚙️ Admin Panel</h1><p>Hier kannst du Benutzerrollen und Lernfelder verwalten.</p>`;
}
</script>

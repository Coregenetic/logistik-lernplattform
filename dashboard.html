<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard – Logistik-Lernplattform</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ── BASIS & LAYOUT ────────────────────────────── */
:root {
  --sidebar-width: 260px;
  --header-height: 64px;
}

/* ── TOGGLE ─────────────────────────────────────── */
.lf-locked { opacity:0.45; cursor:not-allowed; position:relative; }
.lf-locked::after { content:'🔒'; position:absolute; top:12px; right:12px; font-size:1rem; }
.toggle { position:relative; width:40px; height:22px; cursor:pointer; display:inline-block; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; inset:0; background:var(--border2); border-radius:99px; transition:0.2s; }
.toggle-slider:before { content:''; position:absolute; width:16px; height:16px; left:3px; top:3px; background:#fff; border-radius:50%; transition:0.2s; }
input:checked + .toggle-slider { background:var(--correct); }
input:checked + .toggle-slider:before { transform:translateX(18px); }

/* ── NEU: LERNFELD KATEGORIE AKKORDEON ─────────── */
.cat-group {
  margin-bottom: 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.cat-group:hover { box-shadow: var(--shadow-sm); }
.cat-group.closed .cat-body { display: none; }

.cat-header {
  padding: 14px 18px;
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
}
.cat-header:hover { background: var(--surface2); }

.cat-title-wrap { display: flex; align-items: center; gap: 12px; }
.cat-icon { font-size: 1.2rem; }
.cat-name { font-weight: 700; font-size: 0.95rem; color: var(--text); }
.cat-count { font-size: 0.75rem; color: var(--muted2); background: var(--surface2); padding: 2px 8px; border-radius: 99px; }

.cat-chevron { 
  font-size: 0.7rem; 
  color: var(--muted); 
  transition: transform 0.3s; 
}
.cat-group.open .cat-chevron { transform: rotate(180deg); }

.cat-body {
  padding: 12px;
  background: var(--bg);
  border-top: 1px solid var(--border);
}

/* ── STEP CARDS (INHALTE) ──────────────────────── */
.step-card { 
  display: flex; 
  align-items: center; 
  gap: 16px; 
  background: var(--surface); 
  border: 1px solid var(--border); 
  padding: 14px; 
  border-radius: 10px; 
  margin-bottom: 8px; 
  cursor: pointer; 
  transition: 0.2s; 
}
.step-card:last-child { margin-bottom: 0; }
.step-card:hover { border-color: var(--accent); transform: translateX(4px); }
.step-number { 
  width: 30px; height: 30px; 
  border-radius: 8px; 
  background: var(--surface2); 
  color: var(--muted2); 
  display: flex; align-items: center; justify-content: center; 
  font-weight: 700; font-size: 0.8rem; flex-shrink: 0; 
}
.step-card.done .step-number { background: var(--correct); color: #fff; }
.step-info { flex: 1; min-width: 0; }
.step-title { font-weight: 600; font-size: 0.92rem; margin-bottom: 2px; }
.step-meta { font-size: 0.72rem; color: var(--muted2); text-transform: capitalize; }

/* ── MOBILE ADAPTIONEN ─────────────────────────── */
.bottom-nav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border); z-index: 200;
  padding-bottom: env(safe-area-inset-bottom);
}
.bottom-nav-inner { display: flex; height: 58px; }
.bn-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; border: none; background: none; color: var(--muted); font-size: 0.68rem; font-weight: 500; cursor: pointer; transition: 0.15s;
}
.bn-item.active { color: var(--accent); }
.bn-icon { font-size: 1.3rem; line-height: 1; }

.mob-header {
  display: none; position: sticky; top: 0; z-index: 100;
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 16px; height: 52px; align-items: center; justify-content: space-between;
}
.mob-main { display: none; padding: 16px 16px 100px; min-height: calc(100vh - 52px); }

/* ── RESPONSIVE ─────────────────────────────────── */
@media (min-width: 701px) {
  .mob-header, .mob-main, .bottom-nav { display: none !important; }
  .navbar, .layout { display: flex !important; }
}
@media (max-width: 700px) {
  .navbar, .layout { display: none !important; }
  .mob-header { display: flex !important; }
  .mob-main { display: block !important; }
  .bottom-nav { display: block !important; }
}
</style>
</head>
<body>

<!-- ── DESKTOP NAVBAR ─────────────────────────── -->
<nav class="navbar">
  <div class="navbar-brand gradient-text">🚛 Lernplattform Logistik</div>
  <div class="navbar-nav">
    <span class="nav-user">
      <span id="nav-name" style="font-size:0.88rem"></span>
      <span id="nav-badge"></span>
    </span>
    <button class="btn btn-secondary btn-sm" id="btn-logout">Abmelden</button>
  </div>
</nav>

<!-- ── DESKTOP LAYOUT ─────────────────────────── -->
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<!-- ── MOBILE HEADER ──────────────────────────── -->
<div class="mob-header">
  <div class="mob-header-brand gradient-text">🚛 Lernplattform</div>
  <div class="mob-header-right">
    <span id="mob-badge"></span>
    <button class="mob-avatar" id="mob-avatar"></button>
  </div>
</div>

<!-- ── MOBILE MAIN ────────────────────────────── -->
<div class="mob-main" id="mob-main"></div>

<!-- ── BOTTOM NAV ─────────────────────────────── -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner" id="bottom-nav"></div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let USER = null, PROFILE = null;

// ── INIT ─────────────────────────────────────────
db.auth.getSession().then(async ({ data: { session } }) => {
  if (!session) return window.location.href = 'index.html';
  USER = session.user;
  const { data } = await db.from('profiles').select('*').eq('id', USER.id).maybeSingle();
  PROFILE = data;
  if (!PROFILE) return window.location.href = 'index.html';

  setupUI();
  showHome();
});

function setupUI() {
  const roleColors = { admin:'badge-admin', mod:'badge-mod', user:'badge-user' };
  const initials = PROFILE.username.substring(0,2).toUpperCase();
  document.getElementById('nav-name').textContent = PROFILE.username;
  document.getElementById('nav-badge').innerHTML = `<span class="badge ${roleColors[PROFILE.role]}">${PROFILE.role}</span>`;
  document.getElementById('mob-badge').innerHTML = `<span class="badge ${roleColors[PROFILE.role]}">${PROFILE.role}</span>`;
  document.getElementById('mob-avatar').textContent = initials;
  document.getElementById('mob-avatar').onclick = () => { if (confirm('Abmelden?')) { db.auth.signOut(); window.location.href = 'index.html'; } };
  buildSidebar();
  buildBottomNav();
}

document.getElementById('btn-logout').addEventListener('click', async () => { await db.auth.signOut(); window.location.href = 'index.html'; });

// ── NAVIGATION ──────────────────────────────────
function buildSidebar() {
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const isAdmin = PROFILE.role === 'admin';
  document.getElementById('sidebar').innerHTML = `
    <div class="sidebar-title">Navigation</div>
    <button class="sidebar-link active" id="lnk-home" onclick="showHome()"><span class="sidebar-icon">🏠</span>Dashboard</button>
    <button class="sidebar-link" id="lnk-lf" onclick="showLernfelder()"><span class="sidebar-icon">📚</span>Lernfelder</button>
    <button class="sidebar-link" id="lnk-fp" onclick="showFortschritt()"><span class="sidebar-icon">📊</span>Mein Fortschritt</button>
    ${isMod ? `<div class="sidebar-title" style="margin-top:12px">Verwaltung</div>
    <button class="sidebar-link" id="lnk-inhalte" onclick="showInhalte()"><span class="sidebar-icon">✏️</span>Inhalte bearbeiten</button>` : ''}
  `;
}

function buildBottomNav() {
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const items = [
    { id:'bn-home', icon:'🏠', label:'Start', fn:'showHome()' },
    { id:'bn-lf', icon:'📚', label:'Lernen', fn:'showLernfelder()' },
    { id:'bn-fp', icon:'📊', label:'Erfolg', fn:'showFortschritt()' },
    ...(isMod ? [{ id:'bn-inhalte', icon:'✏️', label:'Edit', fn:'showInhalte()' }] : []),
  ];
  document.getElementById('bottom-nav').innerHTML = items.map(i => `
    <button class="bn-item" id="${i.id}" onclick="${i.fn}"><span class="bn-icon">${i.icon}</span><span>${i.label}</span></button>
  `).join('');
}

function setActive(dId, mId) {
  document.querySelectorAll('.sidebar-link, .bn-item').forEach(l => l.classList.remove('active'));
  if (dId) document.getElementById(dId)?.classList.add('active');
  if (mId) document.getElementById(mId)?.classList.add('active');
}

// ── HOME & LERNFELDER ────────────────────────────
async function showHome() {
  setActive('lnk-home', 'bn-home');
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const [{ count: lfCount }, { count: fpCount }, { data: recent }] = await Promise.all([
    db.from('lernfelder').select('*', { count:'exact', head:true }),
    db.from('fortschritt').select('*', { count:'exact', head:true }).eq('user_id', USER.id).eq('abgeschlossen', true),
    db.from('lernfelder').select('*').order('nummer').limit(4)
  ]);

  const html = `
    <h1>Hallo, <span class="gradient-text">${PROFILE.username}</span> 👋</h1>
    <div class="grid-3" style="margin: 20px 0 30px">
      <div class="stat-card"><div class="stat-value gradient-text">${lfCount||0}</div><div class="stat-label">Lernfelder</div></div>
      <div class="stat-card"><div class="stat-value gradient-text">${fpCount||0}</div><div class="stat-label">Erledigt</div></div>
    </div>
    <h2>Schnellstart</h2>
    <div class="grid-2">${(recent||[]).map(lf => lfCard(lf, isMod)).join('')}</div>
  `;
  document.getElementById('main').innerHTML = html;
  document.getElementById('mob-main').innerHTML = `
    <div class="mob-greeting">Hallo, <span class="gradient-text">${PROFILE.username}</span></div>
    <div class="mob-stats">
      <div class="mob-stat"><div class="mob-stat-val gradient-text">${lfCount||0}</div><div class="mob-stat-lbl">Bereiche</div></div>
      <div class="mob-stat"><div class="mob-stat-val gradient-text">${fpCount||0}</div><div class="mob-stat-lbl">Erledigt</div></div>
    </div>
    <div class="mob-section">Lernfelder</div>
    ${(recent||[]).map(lf => mobLfCard(lf, isMod)).join('')}
  `;
}

async function showLernfelder() {
  setActive('lnk-lf', 'bn-lf');
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const { data: bereiche } = await db.from('lernbereiche').select('*, lernfelder(*)').order('reihenfolge');

  const html = `<h1>Lerninhalte</h1>${bereiche.map(b => `
    <div style="margin-bottom:30px">
      <h3>${b.icon} ${b.name}</h3>
      <div class="grid-3">${b.lernfelder.sort((a,z)=>a.nummer-z.nummer).map(lf=>lfCard(lf,isMod)).join('')}</div>
    </div>
  `).join('')}`;
  document.getElementById('main').innerHTML = html;
  document.getElementById('mob-main').innerHTML = `<div class="mob-greeting">Bibliothek</div>${bereiche.map(b => `
    <div class="mob-section" style="margin-top:15px">${b.icon} ${b.name}</div>
    ${b.lernfelder.sort((a,z)=>a.nummer-z.nummer).map(lf=>mobLfCard(lf,isMod)).join('')}
  `).join('')}`;
}

// ── LERNFELD DETAIL (MIT GRUPPIERUNG & AKKORDEON) ──
async function showLernfeldDetail(lfId) {
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const [{ data: lf }, { data: inhalte }, { data: progress }] = await Promise.all([
    db.from('lernfelder').select('*, lernbereiche(name)').eq('id', lfId).maybeSingle(),
    db.from('inhalte').select('*').eq('lernfeld_id', lfId).order('reihenfolge'),
    db.from('fortschritt').select('inhalt_id').eq('user_id', USER.id).eq('abgeschlossen', true)
  ]);

  if (!lf) return;
  const doneIds = (progress || []).map(p => p.inhalt_id);
  const typeIcon = { text:'📄', quiz:'❓', lernkarten:'🃏', html:'🌐' };

  // Gruppierung nach Kategorie
  const groups = {};
  (inhalte || []).forEach(i => {
    const kat = i.kategorie || 'Allgemein';
    if (!groups[kat]) groups[kat] = [];
    groups[kat].push(i);
  });

  const renderGroups = () => {
    return Object.entries(groups).map(([katName, items], gIdx) => {
      const doneCount = items.filter(i => doneIds.includes(i.id)).length;
      const isExercises = katName.toLowerCase().includes('übung') || katName.toLowerCase().includes('aufgabe');
      const startOpen = !isExercises; // Übungen standardmäßig einklappen

      return `
        <div class="cat-group ${startOpen ? 'open' : 'closed'}" id="cat-${gIdx}">
          <div class="cat-header" onclick="toggleCat(${gIdx})">
            <div class="cat-title-wrap">
              <span class="cat-icon">${isExercises ? '✏️' : '📚'}</span>
              <span class="cat-name">${katName}</span>
              <span class="cat-count">${doneCount} / ${items.length} erledigt</span>
            </div>
            <div class="cat-chevron">▼</div>
          </div>
          <div class="cat-body">
            ${items.map((i, idx) => `
              <div class="step-card ${doneIds.includes(i.id) ? 'done' : ''}" onclick="showInhalt(${i.id}, ${lfId})">
                <div class="step-number">${doneIds.includes(i.id) ? '✓' : idx + 1}</div>
                <div class="step-info">
                  <div class="step-title">${i.titel}</div>
                  <div class="step-meta">${typeIcon[i.typ] || '📄'} ${i.typ}</div>
                </div>
                <div style="color:var(--accent)">→</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }).join('');
  };

  const header = `
    <button class="btn btn-secondary btn-sm" onclick="showLernfelder()" style="margin-bottom:20px">← Zurück</button>
    <div style="margin-bottom:24px">
      <div style="color:var(--accent); font-weight:700; font-size:0.7rem; text-transform:uppercase">LF ${lf.nummer}</div>
      <h1 style="margin:0">${lf.icon} ${lf.name}</h1>
    </div>
  `;

  document.getElementById('main').innerHTML = header + renderGroups();
  document.getElementById('mob-main').innerHTML = `<button class="mob-back" onclick="showLernfelder()">← Zurück</button><h3>${lf.name}</h3>` + renderGroups();
}

function toggleCat(idx) {
  const el = document.getElementById('cat-' + idx);
  el.classList.toggle('open');
  el.classList.toggle('closed');
}

// ── INHALTE PFLEGEN ──────────────────────────────
async function showInhalte() {
  setActive('lnk-inhalte', 'bn-inhalte');
  const { data: lf } = await db.from('lernfelder').select('id, nummer, name').order('nummer');
  const { data: inh } = await db.from('inhalte').select('*, lernfelder(nummer)').order('lernfeld_id');
  window._lf = lf;

  const renderForm = (existing = null) => {
    const isEdit = !!existing;
    document.getElementById('form-wrap').innerHTML = `
      <div class="card" style="margin-bottom:24px; border-left:4px solid var(--accent)">
        <h3>${isEdit ? 'Inhalt bearbeiten' : 'Neuer Inhalt'}</h3>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Lernfeld</label>
            <select class="form-input" id="f-lf">${lf.map(l=>`<option value="${l.id}" ${l.id==existing?.lernfeld_id?'selected':''}>LF ${l.nummer}: ${l.name}</option>`).join('')}</select>
          </div>
          <div class="form-group"><label class="form-label">Kategorie (z.B. Theorie, Übungen)</label>
            <input type="text" class="form-input" id="f-kat" placeholder="Optional" value="${existing?.kategorie||''}">
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Titel</label><input type="text" class="form-input" id="f-titel" value="${existing?.titel||''}"></div>
          <div class="form-group"><label class="form-label">Typ</label>
            <select class="form-input" id="f-typ">
              <option value="html" ${existing?.typ=='html'?'selected':''}>🌐 HTML Datei</option>
              <option value="text" ${existing?.typ=='text'?'selected':''}>📄 Text</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Inhalt (Text oder Dateipfad)</label><textarea class="form-input" id="f-text" rows="3">${existing?.inhalt?.text||''}</textarea></div>
        <button class="btn btn-primary" onclick="saveInhalt(${isEdit}, ${existing?.id})">💾 Speichern</button>
        <button class="btn btn-secondary" onclick="showInhalte()">Abbrechen</button>
      </div>
    `;
  };

  document.getElementById('main').innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
      <h1>Inhalte bearbeiten</h1>
      <button class="btn btn-primary" onclick="renderF()">+ Neu</button>
    </div>
    <div id="form-wrap"></div>
    <div class="table-wrap"><table>
      <thead><tr><th>LF</th><th>Kategorie</th><th>Titel</th><th>Aktion</th></tr></thead>
      <tbody>${inh.map(i=>`<tr><td>LF ${i.lernfelder?.nummer}</td><td>${i.kategorie||'-'}</td><td>${i.titel}</td><td><button class="btn btn-secondary btn-sm" onclick="editInh(${i.id})">✏️</button></td></tr>`).join('')}</tbody>
    </table></div>
  `;
  window.renderF = () => renderForm();
  window.editInh = (id) => renderForm(inh.find(x=>x.id==id));
}

async function saveInhalt(isEdit, id) {
  const payload = {
    lernfeld_id: document.getElementById('f-lf').value,
    kategorie: document.getElementById('f-kat').value.trim() || null,
    titel: document.getElementById('f-titel').value.trim(),
    typ: document.getElementById('f-typ').value,
    inhalt: { text: document.getElementById('f-text').value.trim() }
  };
  if (isEdit) await db.from('inhalte').update(payload).eq('id', id);
  else await db.from('inhalte').insert({ ...payload, erstellt_von: USER.id });
  showInhalte();
}

// ── WEITERE FUNKTIONEN ───────────────────────────
async function showInhalt(inhaltId, lfId) {
  const { data: i } = await db.from('inhalte').select('*').eq('id', inhaltId).single();
  let viewer = i.typ === 'html' ? `<div class="iframe-container"><iframe src="${i.inhalt.text}"></iframe></div>` : `<div class="card">${i.inhalt.text.replace(/\n/g,'<br>')}</div>`;
  
  const content = `<button class="btn btn-secondary btn-sm" onclick="showLernfeldDetail(${lfId})" style="margin-bottom:20px">← Zurück</button><h2>${i.titel}</h2>${viewer}
    <div style="margin-top:20px"><button class="btn btn-success" onclick="markDone(${i.id}, ${lfId})">✅ Erledigt</button></div>`;
  
  document.getElementById('main').innerHTML = content;
  document.getElementById('mob-main').innerHTML = content;
}

async function markDone(id, lfId) {
  await db.from('fortschritt').upsert({ user_id: USER.id, inhalt_id: id, abgeschlossen: true, completed_at: new Date().toISOString() });
  showLernfeldDetail(lfId);
}

function lfCard(lf, isMod) { return `<div class="lf-card ${!lf.freigeschaltet && !isMod?'lf-locked':''}" onclick="showLernfeldDetail(${lf.id})"><div class="lf-card-icon">${lf.icon}</div><div class="lf-card-num">LF ${lf.nummer}</div><div class="lf-card-name">${lf.name}</div></div>`; }
function mobLfCard(lf, isMod) { return `<div class="mob-lf-card" onclick="showLernfeldDetail(${lf.id})"><div class="mob-lf-icon-wrap">${lf.icon}</div><div class="mob-lf-info"><div class="mob-lf-num">LF ${lf.nummer}</div><div class="mob-lf-name">${lf.name}</div></div><div class="mob-lf-arrow">›</div></div>`; }

async function showFortschritt() {
  setActive('lnk-fp', 'bn-fp');
  const { data: fp } = await db.from('fortschritt').select('*, inhalte(titel, lernfelder(nummer))').eq('user_id', USER.id).eq('abgeschlossen', true);
  const rows = (fp||[]).map(f => `<tr><td>LF ${f.inhalte?.lernfelder?.nummer}</td><td>${f.inhalte?.titel}</td><td>${new Date(f.completed_at).toLocaleDateString()}</td></tr>`).join('');
  document.getElementById('main').innerHTML = `<h1>📊 Erfolg</h1><div class="table-wrap"><table><thead><tr><th>LF</th><th>Inhalt</th><th>Datum</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
</script>
</body>
</html>

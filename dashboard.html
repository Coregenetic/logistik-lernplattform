<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard – Logistik Lernportal</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ── BASIS UPGRADES ────────────────────────────── */
:root {
  --sidebar-width: 260px;
  --header-height: 64px;
}

/* ── KATEGORIEN & AKKORDEON ────────────────────── */
.cat-group {
  margin-bottom: 16px;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: var(--surface);
  overflow: hidden;
  transition: all 0.3s ease;
}
.cat-group.closed .cat-body { display: none; }
.cat-group.open { border-color: var(--accent); box-shadow: var(--shadow-md); }

.cat-header {
  padding: 16px 20px;
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
}
.cat-header:hover { background: var(--surface2); }

.cat-info { display: flex; align-items: center; gap: 12px; }
.cat-icon { font-size: 1.25rem; }
.cat-name { font-weight: 700; font-size: 1rem; color: var(--text); }
.cat-badge { font-size: 0.7rem; background: var(--accent-light); color: var(--accent); padding: 3px 10px; border-radius: 99px; font-weight: 600; }

.cat-chevron { 
  font-size: 0.8rem; 
  color: var(--muted); 
  transition: transform 0.3s ease; 
}
.cat-group.open .cat-chevron { transform: rotate(180deg); }

.cat-body {
  padding: 12px;
  background: var(--bg);
  border-top: 1px solid var(--border);
}

/* ── STEP CARDS ─────────────────────────────────── */
.step-card {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.step-card:last-child { margin-bottom: 0; }
.step-card:hover { border-color: var(--accent); transform: translateX(5px); background: var(--surface2); }
.step-card.done { border-color: var(--correct-light); background: rgba(var(--correct-rgb), 0.05); }

.step-num {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: var(--surface2);
  color: var(--muted2);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.85rem; flex-shrink: 0;
}
.step-card.done .step-num { background: var(--correct); color: #fff; }

.step-main { flex: 1; min-width: 0; }
.step-titel { font-weight: 600; font-size: 0.95rem; color: var(--text); margin-bottom: 2px; }
.step-meta { font-size: 0.72rem; color: var(--muted2); display: flex; gap: 8px; align-items: center; }

/* ── ADMIN/MOD TOGGLE & BADGES ─────────────────── */
.badge-admin { background: #fee2e2; color: #dc2626; }
.badge-mod { background: #fef3c7; color: #d97706; }
.badge-user { background: #e0f2fe; color: #0284c7; }

/* ── MOBILE NAV FIXES ───────────────────────────── */
.bottom-nav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border); z-index: 1000;
  padding-bottom: env(safe-area-inset-bottom);
}
.bottom-nav-inner { display: flex; height: 60px; }
.bn-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; border: none; background: none; color: var(--muted); font-size: 0.7rem; font-weight: 600; cursor: pointer;
}
.bn-item.active { color: var(--accent); }
.bn-icon { font-size: 1.4rem; line-height: 1; }

@media (max-width: 700px) {
  .navbar, .layout { display: none !important; }
  .mob-header, .mob-main, .bottom-nav { display: block !important; }
  .mob-header { display: flex !important; }
}
</style>
</head>
<body>

<!-- ── DESKTOP NAVBAR ─────────────────────────── -->
<nav class="navbar">
  <div class="navbar-brand gradient-text">🚛 Lernplattform Logistik</div>
  <div class="navbar-nav">
    <span class="nav-user">
      <span id="nav-name" style="font-weight:700"></span>
      <span id="nav-badge"></span>
    </span>
    <button class="btn btn-secondary btn-sm" id="btn-logout">Abmelden</button>
  </div>
</nav>

<!-- ── DESKTOP LAYOUT ─────────────────────────── -->
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<!-- ── MOBILE HEADER ──────────────────────────── -->
<div class="mob-header">
  <div class="mob-header-brand gradient-text">🚛 Logistik Portal</div>
  <div class="mob-header-right" style="display:flex; align-items:center; gap:10px;">
    <span id="mob-badge"></span>
    <button class="mob-avatar" id="mob-avatar"></button>
  </div>
</div>

<!-- ── MOBILE MAIN ────────────────────────────── -->
<div class="mob-main" id="mob-main" style="padding: 16px 16px 100px;"></div>

<!-- ── BOTTOM NAV ─────────────────────────────── -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner" id="bottom-nav"></div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let USER = null, PROFILE = null;

// ── INIT ─────────────────────────────────────────
db.auth.getSession().then(async ({ data: { session } }) => {
  if (!session) return window.location.href = 'index.html';
  USER = session.user;
  const { data } = await db.from('profiles').select('*').eq('id', USER.id).maybeSingle();
  PROFILE = data;
  if (!PROFILE) return window.location.href = 'index.html';

  setupUI();
  showHome();
});

function setupUI() {
  const roleColors = { admin:'badge-admin', mod:'badge-mod', user:'badge-user' };
  const initials = PROFILE.username.substring(0,2).toUpperCase();
  
  // Desktop
  document.getElementById('nav-name').textContent = PROFILE.username;
  document.getElementById('nav-badge').innerHTML = `<span class="badge ${roleColors[PROFILE.role]}">${PROFILE.role}</span>`;
  
  // Mobile
  document.getElementById('mob-badge').innerHTML = `<span class="badge ${roleColors[PROFILE.role]}">${PROFILE.role}</span>`;
  document.getElementById('mob-avatar').textContent = initials;
  document.getElementById('mob-avatar').onclick = () => { if(confirm('Abmelden?')) { db.auth.signOut(); window.location.href='index.html'; } };

  buildSidebar();
  buildBottomNav();
}

document.getElementById('btn-logout').addEventListener('click', async () => { await db.auth.signOut(); window.location.href = 'index.html'; });

// ── NAVIGATION BUILDER ───────────────────────────
function buildSidebar() {
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const isAdmin = PROFILE.role === 'admin';
  
  document.getElementById('sidebar').innerHTML = `
    <div class="sidebar-title">Lernen</div>
    <button class="sidebar-link active" id="lnk-home" onclick="showHome()"><span class="sidebar-icon">🏠</span>Dashboard</button>
    <button class="sidebar-link" id="lnk-lf" onclick="showLernfelder()"><span class="sidebar-icon">📚</span>Lernfelder</button>
    <button class="sidebar-link" id="lnk-fp" onclick="showFortschritt()"><span class="sidebar-icon">📊</span>Fortschritt</button>
    
    ${isMod ? `
      <div class="sidebar-title" style="margin-top:20px">Redaktion</div>
      <button class="sidebar-link" id="lnk-inhalte" onclick="showInhalte()"><span class="sidebar-icon">✏️</span>Inhalte pflegen</button>
    ` : ''}
    
    ${isAdmin ? `
      <div class="sidebar-title" style="margin-top:20px">System</div>
      <button class="sidebar-link" id="lnk-admin" onclick="showAdmin()"><span class="sidebar-icon">⚙️</span>Admin Panel</button>
    ` : ''}
  `;
}

function buildBottomNav() {
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const items = [
    { id:'bn-home', icon:'🏠', label:'Start', fn:'showHome()' },
    { id:'bn-lf', icon:'📚', label:'Lernen', fn:'showLernfelder()' },
    { id:'bn-fp', icon:'📊', label:'Erfolg', fn:'showFortschritt()' },
    ...(isMod ? [{ id:'bn-inhalte', icon:'✏️', label:'Edit', fn:'showInhalte()' }] : [])
  ];
  document.getElementById('bottom-nav').innerHTML = items.map(i => `
    <button class="bn-item" id="${i.id}" onclick="${i.fn}">
      <span class="bn-icon">${i.icon}</span>
      <span>${i.label}</span>
    </button>
  `).join('');
}

function setActive(dId, mId) {
  document.querySelectorAll('.sidebar-link, .bn-item').forEach(l => l.classList.remove('active'));
  if (dId) document.getElementById(dId)?.classList.add('active');
  if (mId) document.getElementById(mId)?.classList.add('active');
}

// ── LERNFELD DETAIL (KATEGORISIERT) ───────────────
async function showLernfeldDetail(lfId) {
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const [{ data: lf }, { data: inhalte }, { data: progress }] = await Promise.all([
    db.from('lernfelder').select('*, lernbereiche(name)').eq('id', lfId).maybeSingle(),
    db.from('inhalte').select('*').eq('lernfeld_id', lfId).order('reihenfolge'),
    db.from('fortschritt').select('inhalt_id').eq('user_id', USER.id).eq('abgeschlossen', true)
  ]);

  if (!lf) return;
  const doneIds = (progress || []).map(p => p.inhalt_id);
  const typeIcons = { text:'📄', html:'🌐', quiz:'❓', lernkarten:'🃏' };

  // Gruppierung nach Kategorie
  const groups = {};
  (inhalte || []).forEach(i => {
    const kat = i.kategorie || 'Lerninhalte';
    if (!groups[kat]) groups[kat] = [];
    groups[kat].push(i);
  });

  const renderGroup = (katName, items, idx) => {
    const doneCount = items.filter(i => doneIds.includes(i.id)).length;
    // Übungen & Klausuren standardmäßig einklappen
    const isExercise = katName.toLowerCase().includes('übung') || katName.toLowerCase().includes('aufgabe') || katName.toLowerCase().includes('klausur');
    const startOpen = !isExercise;

    return `
      <div class="cat-group ${startOpen ? 'open' : 'closed'}" id="cat-${idx}">
        <div class="cat-header" onclick="toggleCat(${idx})">
          <div class="cat-info">
            <span class="cat-icon">${isExercise ? '✏️' : '📖'}</span>
            <span class="cat-name">${katName}</span>
            <span class="cat-badge">${doneCount}/${items.length}</span>
          </div>
          <div class="cat-chevron">▼</div>
        </div>
        <div class="cat-body">
          ${items.map((i, sIdx) => `
            <div class="step-card ${doneIds.includes(i.id) ? 'done' : ''}" onclick="showInhalt(${i.id}, ${lfId})">
              <div class="step-num">${doneIds.includes(i.id) ? '✓' : sIdx + 1}</div>
              <div class="step-main">
                <div class="step-titel">${i.titel}</div>
                <div class="step-meta">
                  <span>${typeIcons[i.typ] || '📄'} ${i.typ.toUpperCase()}</span>
                </div>
              </div>
              <div style="color:var(--accent); font-weight:bold">→</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  };

  const content = `
    <button class="btn btn-secondary btn-sm" onclick="showLernfelder()" style="margin-bottom:20px">← Zurück</button>
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:25px">
      <div style="font-size:2.5rem">${lf.icon}</div>
      <div>
        <div style="color:var(--accent); font-weight:800; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px">LF ${lf.nummer}</div>
        <h1 style="margin:0">${lf.name}</h1>
      </div>
    </div>
    ${Object.entries(groups).map(([name, items], i) => renderGroup(name, items, i)).join('')}
  `;

  document.getElementById('main').innerHTML = content;
  document.getElementById('mob-main').innerHTML = content;
}

function toggleCat(idx) {
  const el = document.getElementById('cat-' + idx);
  el.classList.toggle('open');
  el.classList.toggle('closed');
}

// ── HOME ─────────────────────────────────────────
async function showHome() {
  setActive('lnk-home', 'bn-home');
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const [{ count: lfCount }, { count: fpCount }, { data: recent }] = await Promise.all([
    db.from('lernfelder').select('*', { count:'exact', head:true }),
    db.from('fortschritt').select('*', { count:'exact', head:true }).eq('user_id', USER.id).eq('abgeschlossen', true),
    db.from('lernfelder').select('*').order('nummer').limit(4)
  ]);

  const html = `
    <h1 style="margin-bottom:5px">Hallo, <span class="gradient-text">${PROFILE.username}</span> 👋</h1>
    <p style="color:var(--muted2); margin-bottom:30px">Bereit für die nächste Lerneinheit?</p>
    <div class="grid-3" style="margin-bottom:40px">
      <div class="stat-card"><div class="stat-value gradient-text">${lfCount||0}</div><div class="stat-label">Lernfelder</div></div>
      <div class="stat-card"><div class="stat-value gradient-text">${fpCount||0}</div><div class="stat-label">Erledigt</div></div>
      <div class="stat-card"><div class="stat-value gradient-text">${Math.round(((fpCount||0)/((lfCount||1)*5))*100)}%</div><div class="stat-label">Gesamtfortschritt</div></div>
    </div>
    <h2 style="margin-bottom:20px">Zuletzt besucht</h2>
    <div class="grid-2">${(recent||[]).map(lf => lfCard(lf, isMod)).join('')}</div>
  `;
  document.getElementById('main').innerHTML = html;
  document.getElementById('mob-main').innerHTML = html;
}

// ── INHALTE PFLEGEN (MOD+) ──────────────────────
async function showInhalte() {
  setActive('lnk-inhalte', 'bn-inhalte');
  const { data: lf } = await db.from('lernfelder').select('id, nummer, name').order('nummer');
  const { data: inh } = await db.from('inhalte').select('*, lernfelder(nummer)').order('lernfeld_id');

  const renderForm = (existing = null) => {
    const isEdit = !!existing;
    document.getElementById('form-area').innerHTML = `
      <div class="card" style="margin-bottom:25px; border-left:5px solid var(--accent)">
        <h3>${isEdit ? 'Inhalt bearbeiten' : 'Neuen Inhalt hinzufügen'}</h3>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Lernfeld</label>
            <select class="form-input" id="f-lf">${lf.map(l=>`<option value="${l.id}" ${l.id==existing?.lernfeld_id?'selected':''}>LF ${l.nummer}: ${l.name}</option>`).join('')}</select>
          </div>
          <div class="form-group"><label class="form-label">Kategorie (z.B. Theorie, Übung)</label>
            <input type="text" class="form-input" id="f-kat" placeholder="Standard: Lerninhalte" value="${existing?.kategorie||''}">
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Titel</label><input type="text" class="form-input" id="f-titel" value="${existing?.titel||''}"></div>
          <div class="form-group"><label class="form-label">Typ</label>
            <select class="form-input" id="f-typ">
              <option value="html" ${existing?.typ=='html'?'selected':''}>HTML Datei</option>
              <option value="text" ${existing?.typ=='text'?'selected':''}>Text/Lektion</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Inhalt / Pfad</label><textarea class="form-input" id="f-text" rows="3">${existing?.inhalt?.text||''}</textarea></div>
        <div style="display:flex; gap:10px">
          <button class="btn btn-primary" onclick="saveInhalt(${isEdit}, ${existing?.id})">💾 Speichern</button>
          <button class="btn btn-secondary" onclick="document.getElementById('form-area').innerHTML=''">Abbrechen</button>
        </div>
      </div>
    `;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  document.getElementById('main').innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px">
      <h1>Inhalte bearbeiten</h1>
      <button class="btn btn-primary" onclick="window.renderF()">+ Neu</button>
    </div>
    <div id="form-area"></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>LF</th><th>Kategorie</th><th>Titel</th><th>Aktion</th></tr></thead>
        <tbody>${inh.map(i=>`<tr><td>LF ${i.lernfelder?.nummer}</td><td>${i.kategorie||'-'}</td><td>${i.titel}</td><td><button class="btn btn-secondary btn-sm" onclick="editInh(${i.id})">✏️</button></td></tr>`).join('')}</tbody>
      </table>
    </div>
  `;
  window.renderF = () => renderForm();
  window.editInh = (id) => renderForm(inh.find(x => x.id == id));
}

async function saveInhalt(isEdit, id) {
  const payload = {
    lernfeld_id: document.getElementById('f-lf').value,
    kategorie: document.getElementById('f-kat').value.trim() || null,
    titel: document.getElementById('f-titel').value,
    typ: document.getElementById('f-typ').value,
    inhalt: { text: document.getElementById('f-text').value }
  };
  if (isEdit) await db.from('inhalte').update(payload).eq('id', id);
  else await db.from('inhalte').insert({ ...payload, erstellt_von: USER.id });
  showInhalte();
}

// ── ADMIN PANEL (ADMIN ONLY) ─────────────────────
async function showAdmin() {
  setActive('lnk-admin', null);
  const { data: users } = await db.from('profiles').select('*').order('username');
  const { data: lf } = await db.from('lernfelder').select('*').order('nummer');

  document.getElementById('main').innerHTML = `
    <h1>⚙️ Admin Panel</h1>
    <h2 style="margin-top:30px">Freischaltungen</h2>
    <div class="card">
      ${lf.map(l => `
        <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border)">
          <span>LF ${l.nummer}: ${l.name}</span>
          <label class="toggle">
            <input type="checkbox" ${l.freigeschaltet ? 'checked' : ''} onchange="toggleLF(${l.id}, this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </div>
      `).join('')}
    </div>
    
    <h2 style="margin-top:30px">Benutzerrollen</h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Username</th><th>Rolle</th></tr></thead>
        <tbody>${users.map(u => `<tr><td>${u.username}</td><td><span class="badge badge-${u.role}">${u.role}</span></td></tr>`).join('')}</tbody>
      </table>
    </div>
  `;
}

async function toggleLF(id, val) { await db.from('lernfelder').update({ freigeschaltet: val }).eq('id', id); }

// ── WEITERE FUNKTIONEN (Standard) ────────────────
async function showLernfelder() {
  setActive('lnk-lf', 'bn-lf');
  const isMod = ['admin','mod'].includes(PROFILE.role);
  const { data: bereiche } = await db.from('lernbereiche').select('*, lernfelder(*)').order('reihenfolge');
  const html = `<h1>Bibliothek</h1>${bereiche.map(b => `
    <div style="margin-bottom:35px">
      <h3>${b.icon} ${b.name}</h3>
      <div class="grid-3">${b.lernfelder.sort((a,z)=>a.nummer-z.nummer).map(l => lfCard(l, isMod)).join('')}</div>
    </div>
  `).join('')}`;
  document.getElementById('main').innerHTML = html;
  document.getElementById('mob-main').innerHTML = html;
}

async function showInhalt(inhaltId, lfId) {
  const { data: i } = await db.from('inhalte').select('*').eq('id', inhaltId).single();
  let viewer = i.typ === 'html' ? `<div class="iframe-container"><iframe src="${i.inhalt.text}"></iframe></div>` : `<div class="card" style="line-height:1.7">${i.inhalt.text.replace(/\n/g,'<br>')}</div>`;
  const html = `<button class="btn btn-secondary btn-sm" onclick="showLernfeldDetail(${lfId})" style="margin-bottom:20px">← Zurück</button><h2>${i.titel}</h2>${viewer}<div style="margin-top:20px"><button class="btn btn-success" onclick="markDone(${i.id}, ${lfId})">✅ Erledigt</button></div>`;
  document.getElementById('main').innerHTML = html;
  document.getElementById('mob-main').innerHTML = html;
}

async function markDone(id, lfId) { await db.from('fortschritt').upsert({ user_id: USER.id, inhalt_id: id, abgeschlossen: true, completed_at: new Date().toISOString() }); showLernfeldDetail(lfId); }
function lfCard(lf, isMod) { const locked = !lf.freigeschaltet && !isMod; return `<div class="lf-card ${locked?'lf-locked':''}" onclick="${!locked?`showLernfeldDetail(${lf.id})`:''}"><div class="lf-card-icon">${lf.icon}</div><div class="lf-card-num">LF ${lf.nummer}</div><div class="lf-card-name">${lf.name}</div></div>`; }

async function showFortschritt() {
  setActive('lnk-fp', 'bn-fp');
  const { data: fp } = await db.from('fortschritt').select('*, inhalte(titel, lernfelder(nummer))').eq('user_id', USER.id).eq('abgeschlossen', true);
  const rows = (fp||[]).map(f => `<tr><td>LF ${f.inhalte?.lernfelder?.nummer}</td><td>${f.inhalte?.titel}</td><td>${new Date(f.completed_at).toLocaleDateString()}</td></tr>`).join('');
  const html = `<h1>📊 Dein Erfolg</h1><div class="table-wrap"><table><thead><tr><th>LF</th><th>Inhalt</th><th>Abgeschlossen</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
  document.getElementById('mob-main').innerHTML = html;
}
</script>
</body>
</html>

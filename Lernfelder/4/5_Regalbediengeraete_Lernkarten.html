<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Regalbediengeräte (RBG)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 14px 40px; }
  h1 { font-size: 1.3rem; font-weight: 700; color: #34d399; margin-bottom: 3px; text-align: center; }
  .subtitle { font-size: 0.8rem; color: #94a3b8; margin-bottom: 20px; text-align: center; }
  .score-box { display: flex; gap: 16px; margin-bottom: 16px; }
  .score-item { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .dot-green { background: #4ade80; } .dot-red { background: #f87171; }
  .progress-bar { width: 100%; max-width: 500px; background: #1e293b; border-radius: 999px; height: 7px; margin-bottom: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #34d399, #38bdf8); border-radius: 999px; transition: width 0.4s ease; }
  .counter { font-size: 0.75rem; color: #64748b; margin-bottom: 16px; text-align: center; }
  .question-card { width: 100%; max-width: 500px; background: linear-gradient(135deg, #1e293b, #0f1e35); border: 1px solid #334155; border-radius: 18px; padding: 22px 18px; margin-bottom: 16px; }
  .question-text { font-size: 1rem; font-weight: 600; line-height: 1.5; text-align: center; }
  .answers { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .answer-btn { width: 100%; padding: 14px 16px; border: 2px solid #334155; border-radius: 14px; background: #1e293b; color: #f1f5f9; font-size: 0.92rem; font-weight: 500; text-align: left; cursor: pointer; transition: all 0.2s; line-height: 1.4; }
  .answer-btn:active { transform: scale(0.98); }
  .answer-btn.correct { background: #14532d; border-color: #4ade80; color: #4ade80; }
  .answer-btn.wrong { background: #3f1f1f; border-color: #f87171; color: #f87171; }
  .answer-btn.reveal { background: #1a3a2a; border-color: #4ade80; color: #86efac; }
  .answer-btn:disabled { cursor: default; }
  .explanation { width: 100%; max-width: 500px; border-radius: 14px; padding: 14px 16px; font-size: 0.88rem; line-height: 1.5; margin-bottom: 14px; display: none; }
  .explanation.correct { background: #14532d44; border: 1px solid #4ade8066; color: #86efac; }
  .explanation.wrong { background: #3f1f1f44; border: 1px solid #f8717166; color: #fca5a5; }
  .next-btn { width: 100%; max-width: 500px; padding: 15px; border: none; border-radius: 14px; background: linear-gradient(135deg, #34d399, #38bdf8); color: #0f172a; font-size: 1rem; font-weight: 700; cursor: pointer; display: none; margin-bottom: 10px; }
  .result-screen { text-align: center; max-width: 500px; width: 100%; display: none; }
  .result-emoji { font-size: 3rem; margin-bottom: 14px; }
  .result-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; color: #34d399; }
  .result-sub { color: #94a3b8; margin-bottom: 20px; font-size: 0.9rem; }
  .result-score { font-size: 2.8rem; font-weight: 800; color: #4ade80; margin-bottom: 24px; }
  .restart-btn { background: linear-gradient(135deg, #34d399, #38bdf8); color: #0f172a; padding: 14px 32px; border: none; border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<h1>🏢 Regalbediengeräte (RBG)</h1>
<p class="subtitle">Multiple Choice – Thema 5 von 5</p>

<div id="quiz">
  <div class="score-box">
    <div class="score-item"><div class="dot dot-green"></div><span id="correct-count">0 Richtig</span></div>
    <div class="score-item"><div class="dot dot-red"></div><span id="wrong-count">0 Falsch</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="counter" id="counter">Frage 1 von 10</div>
  <div class="question-card"><div class="question-text" id="question"></div></div>
  <div class="answers" id="answers"></div>
  <div class="explanation" id="explanation"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Weiter →</button>
</div>

<div class="result-screen" id="result">
  <div class="result-emoji" id="r-emoji">🎉</div>
  <div class="result-title">Fertig!</div>
  <div class="result-sub" id="r-sub"></div>
  <div class="result-score" id="r-score"></div>
  <button class="restart-btn" onclick="restart()">🔄 Nochmal üben</button>
</div>

<script>
const questions = [{"q": "Was ist ein Regalbediengerät (RBG)?", "answers": ["Ein Gabelstapler für sehr enge Lagergassen", "Ein schienengeführtes Fördergerät, das Waren in Hochregallagern automatisch ein- und auslagert", "Ein Förderband zwischen zwei Regalreihen", "Ein Kran, der speziell für Lager entwickelt wurde"], "correct": 1, "explanation": "Das RBG fährt auf Boden- und Deckenschienen in einer Regalgasse und lagert Waren automatisch oder halbautomatisch ein und aus – typisch in Hochregallagern (HRL)."}, {"q": "Was ist der Unterschied zwischen Einzelspiel und Doppelspiel?", "answers": ["Beim Einzelspiel fährt ein RBG, beim Doppelspiel fahren zwei RBG gleichzeitig", "Beim Einzelspiel wird nur ein- oder ausgelagert, beim Doppelspiel wird in einer Fahrt ein- UND ausgelagert", "Beim Doppelspiel werden zwei Paletten gleichzeitig eingelagert", "Einzelspiel ist manuell, Doppelspiel ist automatisch"], "correct": 1, "explanation": "Einzelspiel = eine Aufgabe pro Fahrt (nur einlagern oder nur auslagern). Doppelspiel = Kombination: auf dem Hinweg einlagern, auf dem Rückweg auslagern – effizienter, da keine Leerfahrten."}, {"q": "Warum ist das Doppelspiel effizienter als das Einzelspiel?", "answers": ["Das RBG fährt doppelt so schnell", "Zwei Paletten werden gleichzeitig transportiert", "Das RBG fährt keine Leerfahrten – es kombiniert Ein- und Auslagerung in einer Fahrt", "Zwei RBG arbeiten gleichzeitig in einer Gasse"], "correct": 2, "explanation": "Beim Doppelspiel ist das RBG nie ohne Auftrag unterwegs: Hinfahrt = Einlagern, Rückfahrt = Auslagern. Das erhöht den Durchsatz deutlich ohne mehr Fahrzeuge zu benötigen."}, {"q": "Was ist die Lastaufnahmeeinrichtung (LAE) eines RBG?", "answers": ["Die Schiene, auf der das RBG fährt", "Der Motor des RBG", "Das Gerät am RBG, das die Ware aufnimmt – typisch eine Teleskopgabel", "Die Steuerungssoftware des RBG"], "correct": 2, "explanation": "Die LAE ist das Anbaugerät, das die Ware greift. Meist ist es eine Teleskopgabel, die ausfahren kann um Paletten in das Regal zu schieben oder herauszuziehen."}, {"q": "Welcher Vorteil zeichnet vollautomatische RBG aus?", "answers": ["Günstiger in der Anschaffung als manuelle RBG", "Können 24/7 ohne Fahrer betrieben werden, gesteuert durch ein Warehouse-Management-System", "Flexibler einsetzbar, da nicht an Schienen gebunden", "Können mehrere Gassen gleichzeitig bedienen"], "correct": 1, "explanation": "Vollautomatische RBG benötigen keinen Fahrer und können rund um die Uhr arbeiten. Ein Warehouse-Management-System (WMS) steuert alle Fahraufträge automatisch."}, {"q": "Was ist ein typischer Nachteil von RBG?", "answers": ["Sie können keine Paletten transportieren", "Sie sind zu langsam für den modernen Lagereibetrieb", "Hohe Anschaffungskosten und bei Ausfall steht die gesamte Gasse", "Sie können nur in beheizten Lagern eingesetzt werden"], "correct": 2, "explanation": "RBG sind teuer in Anschaffung und Wartung. Fällt ein RBG aus, ist die gesamte Gasse blockiert – kein Ein- oder Auslagern möglich. Das ist ein kritisches Risiko."}, {"q": "Welche Schutzmaßnahme ist beim Betrieb von RBG besonders wichtig?", "answers": ["Fahrer muss immer Helm tragen", "RBG nur im Langsamfahrmodus betreiben", "Regalgassen durch Lichtschranken und Tore sichern – Zutrittsverbot während Betrieb", "Last muss immer von Hand in das Regal gehoben werden"], "correct": 2, "explanation": "Da RBG automatisch und schnell fahren, darf niemand in der aktiven Gasse sein. Lichtschranken und gesicherte Tore gewährleisten, dass das RBG sofort stoppt, wenn jemand die Gasse betritt."}, {"q": "In welchem Lagertyp werden RBG hauptsächlich eingesetzt?", "answers": ["In Tiefkühllagern unter -30°C", "In Freilagern ohne Dach", "In Hochregallagern (HRL) mit Regal­höhen von 10–45 m", "Nur in Lagern für gefährliche Güter"], "correct": 2, "explanation": "RBG sind für Hochregallager (HRL) entwickelt worden. Diese Lager haben Regalhöhen von 10 bis über 40 m – Bereiche, die kein Gabelstapler mehr sicher erreichen kann."}, {"q": "Was sind die Hauptbestandteile eines RBG?", "answers": ["Reifen, Lenkrad, Gabel, Motor, Akku", "Förderband, Rollenbahn, Kettenzug, Schiene", "Fahrwerk, Mast, Lastaufnahmeeinrichtung (LAE) und Steuerung", "Ausleger, Haken, Seil, Gegengewicht"], "correct": 2, "explanation": "Das RBG besteht aus: Fahrwerk (fährt auf Bodenschiene), Mast (vertikale Stahlkonstruktion), Lastaufnahmeeinrichtung LAE (z.B. Teleskopgabel) und Steuereinheit (manuell oder automatisch)."}, {"q": "Was unterscheidet ein manuelles von einem vollautomatischen RBG?", "answers": ["Das manuelle RBG hat keine Schienen", "Das vollautomatische RBG kann keine Paletten transportieren", "Beim manuellen RBG sitzt ein Fahrer im Gerät, beim vollautomatischen fährt es fahrerlos per WMS-Steuerung", "Manuelle RBG sind schneller als automatische"], "correct": 2, "explanation": "Manuell = Fahrer steuert alle Bewegungen selbst. Vollautomatisch = kein Fahrer, das WMS (Warehouse Management System) erteilt alle Fahraufträge und das RBG führt sie eigenständig aus."}];
let shuffled, current = 0, correct = 0, wrong = 0;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function start() {
  shuffled = shuffle(questions).map(q => {
    const indexed = q.answers.map((a, i) => ({text: a, isCorrect: i === q.correct}));
    const shuffledA = shuffle(indexed);
    return {...q, shuffledAnswers: shuffledA};
  });
  current = 0; correct = 0; wrong = 0;
  document.getElementById('correct-count').textContent = '0 Richtig';
  document.getElementById('wrong-count').textContent = '0 Falsch';
  document.getElementById('quiz').style.display = 'flex';
  document.getElementById('quiz').style.flexDirection = 'column';
  document.getElementById('quiz').style.alignItems = 'center';
  document.getElementById('quiz').style.width = '100%';
  document.getElementById('result').style.display = 'none';
  render();
}

function render() {
  const q = shuffled[current];
  document.getElementById('counter').textContent = `Frage ${current+1} von ${shuffled.length}`;
  document.getElementById('progress').style.width = `${(current/shuffled.length)*100}%`;
  document.getElementById('question').textContent = q.q;
  const expl = document.getElementById('explanation');
  expl.style.display = 'none'; expl.className = 'explanation';
  document.getElementById('next-btn').style.display = 'none';
  const container = document.getElementById('answers');
  container.innerHTML = '';
  q.shuffledAnswers.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = a.text;
    btn.onclick = () => answer(a.isCorrect, q.explanation, i);
    container.appendChild(btn);
  });
}

function answer(isCorrect, explanation, chosenIdx) {
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b => b.disabled = true);
  const q = shuffled[current];
  btns.forEach((b, i) => {
    if (q.shuffledAnswers[i].isCorrect) b.classList.add(i === chosenIdx ? 'correct' : 'reveal');
    else if (i === chosenIdx) b.classList.add('wrong');
  });
  const expl = document.getElementById('explanation');
  expl.textContent = (isCorrect ? '✅ ' : '❌ ') + explanation;
  expl.className = 'explanation ' + (isCorrect ? 'correct' : 'wrong');
  expl.style.display = 'block';
  if (isCorrect) { correct++; document.getElementById('correct-count').textContent = correct + ' Richtig'; }
  else { wrong++; document.getElementById('wrong-count').textContent = wrong + ' Falsch'; }
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  current++;
  if (current >= shuffled.length) showResult();
  else render();
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  const pct = Math.round((correct / shuffled.length) * 100);
  document.getElementById('r-score').textContent = `${correct} / ${shuffled.length} richtig (${pct}%)`;
  document.getElementById('r-sub').textContent = pct >= 80 ? 'Stark! Du beherrschst das Thema 💪' : pct >= 50 ? 'Gut! Noch ein bisschen üben 👍' : 'Weitermachen – du schaffst das! 📚';
  document.getElementById('r-emoji').textContent = pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '📚';
}

function restart() { start(); }
start();
</script>
</body>
</html>

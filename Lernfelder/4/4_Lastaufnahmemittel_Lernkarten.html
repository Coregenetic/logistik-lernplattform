<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lastaufnahme- & Anschlagmittel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 14px 40px; }
  h1 { font-size: 1.3rem; font-weight: 700; color: #f472b6; margin-bottom: 3px; text-align: center; }
  .subtitle { font-size: 0.8rem; color: #94a3b8; margin-bottom: 20px; text-align: center; }
  .score-box { display: flex; gap: 16px; margin-bottom: 16px; }
  .score-item { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .dot-green { background: #4ade80; } .dot-red { background: #f87171; }
  .progress-bar { width: 100%; max-width: 500px; background: #1e293b; border-radius: 999px; height: 7px; margin-bottom: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #f472b6, #fb923c); border-radius: 999px; transition: width 0.4s ease; }
  .counter { font-size: 0.75rem; color: #64748b; margin-bottom: 16px; text-align: center; }
  .question-card { width: 100%; max-width: 500px; background: linear-gradient(135deg, #1e293b, #0f1e35); border: 1px solid #334155; border-radius: 18px; padding: 22px 18px; margin-bottom: 16px; }
  .question-text { font-size: 1rem; font-weight: 600; line-height: 1.5; text-align: center; }
  .answers { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .answer-btn { width: 100%; padding: 14px 16px; border: 2px solid #334155; border-radius: 14px; background: #1e293b; color: #f1f5f9; font-size: 0.92rem; font-weight: 500; text-align: left; cursor: pointer; transition: all 0.2s; line-height: 1.4; }
  .answer-btn:active { transform: scale(0.98); }
  .answer-btn.correct { background: #14532d; border-color: #4ade80; color: #4ade80; }
  .answer-btn.wrong { background: #3f1f1f; border-color: #f87171; color: #f87171; }
  .answer-btn.reveal { background: #1a3a2a; border-color: #4ade80; color: #86efac; }
  .answer-btn:disabled { cursor: default; }
  .explanation { width: 100%; max-width: 500px; border-radius: 14px; padding: 14px 16px; font-size: 0.88rem; line-height: 1.5; margin-bottom: 14px; display: none; }
  .explanation.correct { background: #14532d44; border: 1px solid #4ade8066; color: #86efac; }
  .explanation.wrong { background: #3f1f1f44; border: 1px solid #f8717166; color: #fca5a5; }
  .next-btn { width: 100%; max-width: 500px; padding: 15px; border: none; border-radius: 14px; background: linear-gradient(135deg, #f472b6, #fb923c); color: #0f172a; font-size: 1rem; font-weight: 700; cursor: pointer; display: none; margin-bottom: 10px; }
  .result-screen { text-align: center; max-width: 500px; width: 100%; display: none; }
  .result-emoji { font-size: 3rem; margin-bottom: 14px; }
  .result-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; color: #f472b6; }
  .result-sub { color: #94a3b8; margin-bottom: 20px; font-size: 0.9rem; }
  .result-score { font-size: 2.8rem; font-weight: 800; color: #4ade80; margin-bottom: 24px; }
  .restart-btn { background: linear-gradient(135deg, #f472b6, #fb923c); color: #0f172a; padding: 14px 32px; border: none; border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<h1>⛓️ Lastaufnahme- & Anschlagmittel</h1>
<p class="subtitle">Multiple Choice – Thema 4 von 5</p>

<div id="quiz">
  <div class="score-box">
    <div class="score-item"><div class="dot dot-green"></div><span id="correct-count">0 Richtig</span></div>
    <div class="score-item"><div class="dot dot-red"></div><span id="wrong-count">0 Falsch</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="counter" id="counter">Frage 1 von 10</div>
  <div class="question-card"><div class="question-text" id="question"></div></div>
  <div class="answers" id="answers"></div>
  <div class="explanation" id="explanation"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Weiter →</button>
</div>

<div class="result-screen" id="result">
  <div class="result-emoji" id="r-emoji">🎉</div>
  <div class="result-title">Fertig!</div>
  <div class="result-sub" id="r-sub"></div>
  <div class="result-score" id="r-score"></div>
  <button class="restart-btn" onclick="restart()">🔄 Nochmal üben</button>
</div>

<script>
const questions = [{"q": "Wie sind Lastaufnahmeeinrichtungen aufgebaut?", "answers": ["Nur aus Haken und Seilen", "Aus Tragmittel + Lastaufnahmemittel + Anschlagmittel", "Aus Kran + Palette + Gabelstapler", "Aus Hubwerk + Fahrwerk + Steuerung"], "correct": 1, "explanation": "Lastaufnahmeeinrichtungen bestehen aus drei Teilen: Tragmittel (verbindet Kran mit LAM), Lastaufnahmemittel (nimmt Last auf) und Anschlagmittel (verbindet LAM mit der Last)."}, {"q": "Was ist ein Anschlagmittel?", "answers": ["Das Gerät, das direkt die Last trägt (z.B. Kranhaken)", "Das Verbindungselement zwischen Lastaufnahmemittel und der Last (z.B. Rundschlinge)", "Der Motor, der den Kran antreibt", "Das Fahrwerk des Krans auf der Kranschiene"], "correct": 1, "explanation": "Anschlagmittel verbinden das Lastaufnahmemittel mit der Last. Typische Beispiele: Rundschlingen, Kettengehänge, Drahtseilgehänge, Hebebänder."}, {"q": "Was ist eine Rundschlinge?", "answers": ["Ein runder Stahlring zur Befestigung an der Kranschiene", "Ein kreisförmiges Textilband als Anschlagmittel zum Umschlingen von Lasten", "Eine runde Palette für zylindrische Güter", "Ein Messgerät für den Neigungswinkel"], "correct": 1, "explanation": "Die Rundschlinge ist ein geschlossenes Textilband, das um die Last gelegt wird. Sie ist flexibel, schont empfindliche Oberflächen und ist ein sehr häufiges Anschlagmittel."}, {"q": "Was bedeutet WLL auf einem Anschlagmittel?", "answers": ["Warenlager-Ladeliste", "Working Load Limit – die zulässige Höchstlast", "Werkzeug-Leihliste", "Warnlicht-Leuchtstärke-Level"], "correct": 1, "explanation": "WLL = Working Load Limit – die maximale Last, die ein Anschlagmittel sicher tragen darf. Diese Angabe muss auf jedem Anschlagmittel stehen und darf niemals überschritten werden."}, {"q": "Was passiert mit der Tragfähigkeit eines Anschlagmittels bei größerem Neigungswinkel?", "answers": ["Die Tragfähigkeit steigt, da mehr Stränge die Last tragen", "Die Tragfähigkeit bleibt gleich, unabhängig vom Winkel", "Die Tragfähigkeit sinkt – bei 60° nur noch ca. 50% der Nennlast", "Der Winkel ist nur bei Kettengehängen relevant, nicht bei Schlingen"], "correct": 2, "explanation": "Je größer der Neigungswinkel (Abweichung von der Senkrechten), desto höher die Zugkräfte im Anschlagmittel und desto geringer die zulässige Last. Bei 60° Winkel sinkt die Tragfähigkeit auf ~50%."}, {"q": "Was ist eine Traverse?", "answers": ["Ein Drahtseil zum Anschlagen von Lasten", "Ein waagerechter Stahlträger, der die Last auf mehrere Anschlagpunkte verteilt", "Eine Sicherheitseinrichtung am Gabelstapler", "Ein Messgerät für die Schwerpunktlage"], "correct": 1, "explanation": "Die Traverse hängt zwischen Kranhaken und Anschlagmitteln. Sie verteilt die Last auf mehrere Punkte und verhindert schädlichen Seitendruck auf die Last – wichtig bei langen oder empfindlichen Gütern."}, {"q": "Was steht auf dem Etikett eines Anschlagmittels?", "answers": ["Name des Fabrikkäufers und Kaufdatum", "Tragfähigkeit (WLL), Hersteller, Prüfzeichen, Länge und Baujahr", "Maximale Lagertemperatur und Reinigungsanweisung", "Nur die Seriennummer des Anschlagmittels"], "correct": 1, "explanation": "Das Etikett muss mindestens enthalten: WLL (zulässige Höchstlast), Hersteller, CE-Zeichen/Prüfzeichen, Länge und Baujahr. Diese Angaben sind gesetzlich vorgeschrieben."}, {"q": "Welche Schutzmaßnahme ist beim Anschlagen an scharfen Kanten wichtig?", "answers": ["Schlingen dicker wählen", "Kantenprotektoren (Kantenschutz) verwenden", "Kran langsamer fahren", "Last in zwei Teile aufteilen"], "correct": 1, "explanation": "Scharfe Kanten können Textilschlingen und Drahtseile durchschneiden. Kantenprotektoren schützen das Anschlagmittel vor Beschädigung und verhindern Seilrisse."}, {"q": "Was ist ein Lastaufnahmemittel? Nenne ein Beispiel.", "answers": ["Das Anschlagmittel zwischen Last und Kran – Beispiel: Rundschlinge", "Das Gerät, das direkt die Last aufnimmt – Beispiel: Kranhaken, Vakuumheber oder Greifer", "Das Tragwerk des Krans – Beispiel: Kranbrücke", "Das Fahrwerk des Krans – Beispiel: Kranschiene"], "correct": 1, "explanation": "Das Lastaufnahmemittel (LAM) nimmt die Last direkt auf. Beispiele: Kranhaken, Traverse, Vakuumheber (für Glas), Elektromagnet (für Stahl), Greifer, Palettengabel."}, {"q": "Was ist ein Schäkel?", "answers": ["Eine textile Rundschlinge für empfindliche Lasten", "Ein Stahlbügel mit Bolzen, der Anschlagmittel mit Haken oder Last verbindet", "Ein Gerät zur Messung des Lastschwerpunkts", "Eine Sicherheitsvorrichtung am Kranführerstand"], "correct": 1, "explanation": "Der Schäkel ist ein bügel- und bolzenförmiges Verbindungselement aus Stahl. Er verbindet Anschlagmittel mit dem Kranhaken oder der Last und muss mit einem Splint gesichert werden."}];
let shuffled, current = 0, correct = 0, wrong = 0;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function start() {
  shuffled = shuffle(questions).map(q => {
    const indexed = q.answers.map((a, i) => ({text: a, isCorrect: i === q.correct}));
    const shuffledA = shuffle(indexed);
    return {...q, shuffledAnswers: shuffledA};
  });
  current = 0; correct = 0; wrong = 0;
  document.getElementById('correct-count').textContent = '0 Richtig';
  document.getElementById('wrong-count').textContent = '0 Falsch';
  document.getElementById('quiz').style.display = 'flex';
  document.getElementById('quiz').style.flexDirection = 'column';
  document.getElementById('quiz').style.alignItems = 'center';
  document.getElementById('quiz').style.width = '100%';
  document.getElementById('result').style.display = 'none';
  render();
}

function render() {
  const q = shuffled[current];
  document.getElementById('counter').textContent = `Frage ${current+1} von ${shuffled.length}`;
  document.getElementById('progress').style.width = `${(current/shuffled.length)*100}%`;
  document.getElementById('question').textContent = q.q;
  const expl = document.getElementById('explanation');
  expl.style.display = 'none'; expl.className = 'explanation';
  document.getElementById('next-btn').style.display = 'none';
  const container = document.getElementById('answers');
  container.innerHTML = '';
  q.shuffledAnswers.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = a.text;
    btn.onclick = () => answer(a.isCorrect, q.explanation, i);
    container.appendChild(btn);
  });
}

function answer(isCorrect, explanation, chosenIdx) {
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b => b.disabled = true);
  const q = shuffled[current];
  btns.forEach((b, i) => {
    if (q.shuffledAnswers[i].isCorrect) b.classList.add(i === chosenIdx ? 'correct' : 'reveal');
    else if (i === chosenIdx) b.classList.add('wrong');
  });
  const expl = document.getElementById('explanation');
  expl.textContent = (isCorrect ? '✅ ' : '❌ ') + explanation;
  expl.className = 'explanation ' + (isCorrect ? 'correct' : 'wrong');
  expl.style.display = 'block';
  if (isCorrect) { correct++; document.getElementById('correct-count').textContent = correct + ' Richtig'; }
  else { wrong++; document.getElementById('wrong-count').textContent = wrong + ' Falsch'; }
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  current++;
  if (current >= shuffled.length) showResult();
  else render();
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  const pct = Math.round((correct / shuffled.length) * 100);
  document.getElementById('r-score').textContent = `${correct} / ${shuffled.length} richtig (${pct}%)`;
  document.getElementById('r-sub').textContent = pct >= 80 ? 'Stark! Du beherrschst das Thema 💪' : pct >= 50 ? 'Gut! Noch ein bisschen üben 👍' : 'Weitermachen – du schaffst das! 📚';
  document.getElementById('r-emoji').textContent = pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '📚';
}

function restart() { start(); }
start();
</script>
</body>
</html>
